      <rect x="0" y="0" width="170" height="160" rx="14" fill="#e8f5ed" stroke="#7CB98A" stroke-width="2"/>
      <rect x="0" y="0" width="170" height="6" rx="3" fill="#4A7C59"/>
      <g transform="translate(85,55)">
