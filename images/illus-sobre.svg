      <text x="85" y="128" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#a78930">Refeição é ato</text>
      <text x="85" y="142" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#a78930">pedagógico</text>
    </g>
