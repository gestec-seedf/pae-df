  <!-- RODAPÉ -->
  <text x="300" y="690" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#3a3a3a" font-style="italic">"Nutrir e ensinar, juntos."</text>
  <text x="300" y="720" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="2.5" fill="#7a6a4a">PAE-DF · EDUCAÇÃO INFANTIL · SEEDF</text>
</svg>
