<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750">
  <defs>
    <linearGradient id="bg-sobre" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf6e8"/>
      <stop offset="1" stop-color="#f5f0e6"/>
    </linearGradient>
    <linearGradient id="grad-mesa" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#a87545"/>
      <stop offset="1" stop-color="#6e4828"/>
    </linearGradient>
    <linearGradient id="grad-parede" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fef8e8"/>
      <stop offset="1" stop-color="#f5ecd0"/>
    </linearGradient>
    <linearGradient id="grad-janela" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#bae3f5"/>
      <stop offset="1" stop-color="#cce8f2"/>
    </linearGradient>
  </defs>

  <rect width="600" height="750" fill="url(#bg-sobre)"/>

  <!-- HEADER -->
  <text x="300" y="50" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" letter-spacing="3.5" fill="#7a6a4a">FUNDAMENTOS · CAPÍTULO 00</text>
  <text x="300" y="92" text-anchor="middle" font-family="Inter,sans-serif" font-size="34" font-weight="700" fill="#3a3a3a">Direito, <tspan font-style="italic" fill="#E87461">não favor</tspan></text>

