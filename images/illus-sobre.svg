  <circle cx="220" cy="200" r="14" fill="#E8C94A" opacity="0.8"/>
  <line x1="110" y1="275" x2="110" y2="240" stroke="#5a3a23" stroke-width="3"/>
  <path d="M110 240 Q 96 230 88 235 M 110 240 Q 124 230 132 235 M 110 240 Q 100 224 95 218 M 110 240 Q 120 224 125 218" stroke="#4A7C59" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="160" y1="275" x2="160" y2="248" stroke="#5a3a23" stroke-width="3"/>
  <path d="M160 248 Q 148 240 142 244 M 160 248 Q 172 240 178 244 M 160 248 Q 152 232 148 226 M 160 248 Q 168 232 172 226" stroke="#5A9A6E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="170" y1="155" x2="170" y2="275" stroke="#a87545" stroke-width="3"/>
  <line x1="80" y1="215" x2="260" y2="215" stroke="#a87545" stroke-width="3"/>
  <rect x="78" y="153" width="184" height="124" rx="8" fill="none" stroke="#8b6238" stroke-width="3"/>

  <!-- Quadro na parede -->
  <g transform="translate(380,200)">
    <rect x="-50" y="-30" width="100" height="60" rx="4" fill="#fff" stroke="#8b6238" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#4A7C59" letter-spacing="1.5">ALIMENTAR-SE</text>
    <text x="0" y="6" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#4A7C59" letter-spacing="1.5">É APRENDER</text>
    <line x1="-30" y1="14" x2="30" y2="14" stroke="#E8C94A" stroke-width="2"/>
    <text x="0" y="24" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="#7a6a4a" font-style="italic">BNCC · DCNEI</text>
  </g>

  <!-- Plantinha em vaso -->
  <g transform="translate(490,250)">
    <rect x="-12" y="-2" width="24" height="20" rx="3" fill="#8B5E3C"/>
    <rect x="-13" y="-4" width="26" height="4" rx="1.5" fill="#5a3a23"/>
    <path d="M0 -2 Q 2 -18 -3 -28" stroke="#4A7C59" stroke-width="2.5" fill="none"/>
    <ellipse cx="-6" cy="-18" rx="5" ry="2.5" fill="#4A7C59" transform="rotate(-30 -6 -18)"/>
    <ellipse cx="5" cy="-24" rx="6" ry="3" fill="#5A9A6E" transform="rotate(20 5 -24)"/>
    <ellipse cx="-4" cy="-30" rx="5" ry="2.5" fill="#4A7C59" transform="rotate(-15 -4 -30)"/>
