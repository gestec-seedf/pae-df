    <path d="M-16 -10 Q -10 -24 0 -24 Q 10 -24 16 -10 L 15 -2 Q 0 -10 -15 -2 Z" fill="#5a3a23"/>
    <ellipse cx="-5" cy="0" rx="1.5" ry="2" fill="#3a3a3a"/>
    <ellipse cx="5" cy="0" rx="1.5" ry="2" fill="#3a3a3a"/>
    <path d="M-4 6 Q 0 10 4 6" stroke="#3a3a3a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M-18 14 L 18 14 L 20 35 L -20 35 Z" fill="#5b9bd5"/>
