    <ellipse cx="0" cy="0" rx="38" ry="11" fill="#fefdf6" stroke="#d4c8a8" stroke-width="1.5"/>
    <ellipse cx="0" cy="-1" rx="32" ry="8" fill="#f8f1de"/>
