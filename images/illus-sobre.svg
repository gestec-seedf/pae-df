      <rect x="0" y="0" width="170" height="160" rx="14" fill="#fdf6e0" stroke="#E8C94A" stroke-width="2"/>
      <rect x="0" y="0" width="170" height="6" rx="3" fill="#D4A54A"/>
      <g transform="translate(85,55)">
        <path d="M-22 8 L 0 0 L 22 8 L 22 -10 L 0 -18 L -22 -10 Z" fill="#fdf6c0"/>
        <path d="M-22 8 L 0 0 L 0 -18 L -22 -10 Z" fill="#fff8e0"/>
        <line x1="-18" y1="-8" x2="-4" y2="-3" stroke="#a78930" stroke-width="0.8"/>
        <line x1="-18" y1="-4" x2="-4" y2="1" stroke="#a78930" stroke-width="0.8"/>
        <line x1="18" y1="-8" x2="4" y2="-3" stroke="#a78930" stroke-width="0.8"/>
        <line x1="18" y1="-4" x2="4" y2="1" stroke="#a78930" stroke-width="0.8"/>
        <line x1="-14" y1="-22" x2="14" y2="-22" stroke="#D4A54A" stroke-width="5" stroke-linecap="round"/>
