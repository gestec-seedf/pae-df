  <!-- ============ 3 PRINCÍPIOS ============ -->
  <g transform="translate(40,490)">
    <!-- DIREITO -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="170" height="160" rx="14" fill="#fdebe7" stroke="#F5A08F" stroke-width="2"/>
