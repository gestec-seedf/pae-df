        <path d="M-22 8 Q -22 -18 0 -18 Q 22 -18 22 8 Z" fill="#5A9A6E"/>
        <circle cx="0" cy="-18" r="3" fill="#4A7C59"/>
        <path d="M-8 -24 Q -8 -32 -4 -34 Q -4 -38 0 -38" stroke="#7CB98A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
        <path d="M0 -24 Q 0 -32 4 -34 Q 4 -38 8 -38" stroke="#7CB98A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
      </g>
      <text x="85" y="110" text-anchor="middle" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="#2d5a3a">NUTRIR</text>
      <text x="85" y="128" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#4A7C59">Comida de verdade</text>
      <text x="85" y="142" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#4A7C59">todos os dias</text>
    </g>

