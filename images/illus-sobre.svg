    <ellipse cx="0" cy="-1" rx="34" ry="9" fill="#f8f1de"/>
    <ellipse cx="-10" cy="-1" rx="10" ry="5" fill="#fdf6e8"/>
    <ellipse cx="8" cy="-1" rx="9" ry="4" fill="#5a3a23"/>
    <ellipse cx="0" cy="3" rx="7" ry="3" fill="#E87461"/>
    <ellipse cx="-15" cy="-4" rx="6" ry="1.2" fill="#fff" opacity="0.6"/>
