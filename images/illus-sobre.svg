    <line x1="-16" y1="-19" x2="-8" y2="-19" stroke="#7a2a20" stroke-width="0.8"/>
    <line x1="-16" y1="-16" x2="-8" y2="-16" stroke="#7a2a20" stroke-width="0.8"/>
  </g>

  <!-- MESA -->
  <g transform="translate(300,400)">
    <path d="M-220 -10 L 220 -10 L 240 25 L -240 25 Z" fill="url(#grad-mesa)"/>
