      <text x="85" y="128" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#a04030">Garantido pela</text>
      <text x="85" y="142" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#a04030">Constituição (1988)</text>
