    <path d="M-18 -55 Q -16 -75 0 -75 Q 16 -75 18 -55 L 16 -42 Q 0 -52 -16 -42 Z" fill="#5a3a23"/>
    <ellipse cx="-6" cy="-50" rx="1.5" ry="2" fill="#3a3a3a"/>
