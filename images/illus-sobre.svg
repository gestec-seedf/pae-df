    <path d="M-4 6 Q 0 10 4 6" stroke="#3a3a3a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M-18 14 L 18 14 L 20 35 L -20 35 Z" fill="#D4A54A"/>
  </g>

