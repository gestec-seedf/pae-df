<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#87CEEB"/>
      <stop offset="0.4" stop-color="#fde7c4"/>
      <stop offset="0.8" stop-color="#f4b87a"/>
      <stop offset="1" stop-color="#c97245"/>
    </linearGradient>
    <radialGradient id="sun" cx="75%" cy="20%" r="25%">
      <stop offset="0" stop-color="#f9d87a"/>
      <stop offset="0.6" stop-color="#eca85a" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#d97a3d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grass" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#5a9a4a"/>
      <stop offset="1" stop-color="#3d7a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky)"/>
  <rect width="1200" height="800" fill="url(#sun)"/>
  <!-- clouds -->
  <g fill="white" opacity="0.6">
    <ellipse cx="200" cy="100" rx="80" ry="30"/>
    <ellipse cx="250" cy="90" rx="60" ry="25"/>
    <ellipse cx="700" cy="130" rx="90" ry="28"/>
    <ellipse cx="760" cy="120" rx="50" ry="22"/>
  </g>
  <!-- butterflies -->
  <g transform="translate(400 200)" fill="#E87461" opacity="0.7">
    <ellipse cx="-8" cy="0" rx="8" ry="12" transform="rotate(-20)"/>
    <ellipse cx="8" cy="0" rx="8" ry="12" transform="rotate(20)"/>
    <rect x="-1" y="-4" width="2" height="14" rx="1" fill="#5a2f1c"/>
  </g>
  <g transform="translate(850 180)" fill="#D4A54A" opacity="0.6">
    <ellipse cx="-6" cy="0" rx="6" ry="10" transform="rotate(-15)"/>
    <ellipse cx="6" cy="0" rx="6" ry="10" transform="rotate(15)"/>
    <rect x="-1" y="-3" width="2" height="12" rx="1" fill="#5a2f1c"/>
  </g>
  <!-- cerrado hills -->
  <path d="M0 520 C200 480 400 510 600 500 C800 490 1000 520 1200 510 L1200 800 L0 800Z" fill="#8a6a3a" opacity="0.3"/>
  <path d="M0 560 C200 530 380 550 560 555 C720 565 900 540 1080 560 L1200 565 L1200 800 L0 800Z" fill="#6d8a44"/>
  <!-- ESCOLA (fundo, lateral direita das colinas) -->
  <g transform="translate(700 555)">
    <!-- Corpo -->
    <rect x="-50" y="-55" width="100" height="55" fill="#fefdf6" stroke="#a87545" stroke-width="2"/>
    <!-- Telhado -->
    <path d="M-58 -55 L 58 -55 L 40 -78 L -40 -78 Z" fill="#E87461"/>
    <!-- Porta -->
    <rect x="-8" y="-26" width="16" height="26" fill="#5a3a23"/>
    <circle cx="4" cy="-13" r="1" fill="#D4A54A"/>
    <!-- Janelas -->
    <rect x="-38" y="-44" width="18" height="14" fill="#7ccae0" stroke="#a87545" stroke-width="1.2"/>
    <line x1="-29" y1="-44" x2="-29" y2="-30" stroke="#fff" stroke-width="0.8"/>
    <line x1="-38" y1="-37" x2="-20" y2="-37" stroke="#fff" stroke-width="0.8"/>
    <rect x="20" y="-44" width="18" height="14" fill="#7ccae0" stroke="#a87545" stroke-width="1.2"/>
    <line x1="29" y1="-44" x2="29" y2="-30" stroke="#fff" stroke-width="0.8"/>
    <line x1="20" y1="-37" x2="38" y2="-37" stroke="#fff" stroke-width="0.8"/>
  </g>
  <!-- PLAQUINHA "PAE-DF · Alimentação é currículo" ao lado da escola -->
  <g transform="translate(810 555)">
    <rect x="-1.5" y="0" width="3" height="32" fill="#5a3a23"/>
    <rect x="-50" y="-22" width="100" height="26" rx="3" fill="#fefdf6" stroke="#4A7C59" stroke-width="1.5"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#4A7C59" letter-spacing="1.2">PAE-DF</text>
    <line x1="-30" y1="-6" x2="30" y2="-6" stroke="#D4A54A" stroke-width="1.2"/>
    <text x="0" y="0" text-anchor="middle" font-family="Inter,sans-serif" font-size="5.8" fill="#7a6a4a" font-style="italic" letter-spacing="0.5">Alimentação é currículo</text>
  </g>
  <!-- grass -->
  <path d="M0 600 C240 580 420 600 640 595 C860 590 1020 610 1200 600 L1200 800 L0 800Z" fill="url(#grass)"/>
  <!-- flowers -->
  <g>
    <circle cx="150" cy="585" r="6" fill="#E87461"/>
    <circle cx="155" cy="580" r="5" fill="#F5A08F"/>
    <circle cx="350" cy="595" r="5" fill="#D4A54A"/>
    <circle cx="550" cy="590" r="6" fill="#E8C94A"/>
    <circle cx="900" cy="598" r="5" fill="#E87461"/>
    <circle cx="1050" cy="592" r="6" fill="#D4A54A"/>
  </g>
  <!-- pequizeiro tree -->
  <g transform="translate(900 560)">
    <rect x="-8" y="-180" width="16" height="180" rx="4" fill="#8B5E3C"/>
    <circle cx="0" cy="-210" r="60" fill="#4A7C59"/>
    <circle cx="-35" cy="-195" r="40" fill="#3d6a40"/>
    <circle cx="35" cy="-195" r="40" fill="#3d6a40"/>
    <circle cx="-15" cy="-175" r="8" fill="#E8C94A"/>
    <circle cx="20" cy="-220" r="7" fill="#E8C94A"/>
    <circle cx="-30" cy="-210" r="6" fill="#E8C94A"/>
  </g>
  <!-- buriti palm -->
  <g transform="translate(100 570)">
    <rect x="-4" y="-200" width="8" height="200" fill="#8B5E3C" rx="3"/>
    <g stroke="#2F3D1E" stroke-width="5" fill="none" stroke-linecap="round">
      <path d="M0 -200 Q-60 -240 -100 -230"/>
      <path d="M0 -200 Q60 -240 100 -230"/>
      <path d="M0 -200 Q-30 -260 -60 -270"/>
      <path d="M0 -200 Q30 -260 60 -270"/>
      <path d="M0 -200 Q0 -270 -5 -280"/>
    </g>
    <circle cx="-15" cy="-190" r="6" fill="#D4A54A"/>
    <circle cx="15" cy="-185" r="6" fill="#D4A54A"/>
    <circle cx="0" cy="-180" r="6" fill="#D4A54A"/>
  </g>
  <!-- HORTA ESCOLAR GRANDE (primeiro plano direita) -->
  <g transform="translate(1010 720)">
    <!-- Cerca/moldura externa (3 estacas) -->
    <line x1="-185" y1="-90" x2="-185" y2="20" stroke="#5a3a23" stroke-width="3"/>
    <line x1="0" y1="-95" x2="0" y2="20" stroke="#5a3a23" stroke-width="3"/>
    <line x1="185" y1="-90" x2="185" y2="20" stroke="#5a3a23" stroke-width="3"/>
    <line x1="-190" y1="-85" x2="190" y2="-85" stroke="#5a3a23" stroke-width="2.5"/>
    <line x1="-190" y1="-50" x2="190" y2="-50" stroke="#5a3a23" stroke-width="2.5"/>

    <!-- Borda do canteiro maior (madeira) -->
    <rect x="-180" y="-30" width="360" height="50" fill="#8b6238"/>
    <rect x="-180" y="-30" width="360" height="8" fill="#5a3a23"/>
    <rect x="-180" y="14" width="360" height="6" fill="#5a3a23"/>
    <!-- Solo (terra fofa) -->
    <rect x="-170" y="-42" width="340" height="18" fill="#5a3a23"/>
    <rect x="-170" y="-42" width="340" height="6" fill="#3a1f10"/>
    <!-- Texture do solo -->
    <circle cx="-140" cy="-32" r="1.5" fill="#3a1f10" opacity="0.6"/>
    <circle cx="-90" cy="-30" r="1.2" fill="#3a1f10" opacity="0.6"/>
    <circle cx="-30" cy="-32" r="1.5" fill="#3a1f10" opacity="0.6"/>
    <circle cx="40" cy="-30" r="1.2" fill="#3a1f10" opacity="0.6"/>
    <circle cx="90" cy="-33" r="1.5" fill="#3a1f10" opacity="0.6"/>
    <circle cx="140" cy="-30" r="1.2" fill="#3a1f10" opacity="0.6"/>

    <!-- TOMATEIRO 1 (fileira de trás) -->
    <g transform="translate(-150,-42)">
      <line x1="0" y1="0" x2="0" y2="-65" stroke="#4A7C59" stroke-width="3.5"/>
      <line x1="0" y1="-30" x2="-10" y2="-25" stroke="#4A7C59" stroke-width="2"/>
      <line x1="0" y1="-30" x2="10" y2="-30" stroke="#4A7C59" stroke-width="2"/>
      <ellipse cx="-10" cy="-22" rx="8" ry="4" fill="#4A7C59" transform="rotate(-30 -10 -22)"/>
      <ellipse cx="12" cy="-32" rx="9" ry="5" fill="#5A9A6E" transform="rotate(30 12 -32)"/>
      <ellipse cx="-8" cy="-48" rx="9" ry="5" fill="#4A7C59" transform="rotate(-20 -8 -48)"/>
      <ellipse cx="10" cy="-58" rx="8" ry="4" fill="#5A9A6E" transform="rotate(20 10 -58)"/>
      <circle cx="-12" cy="-28" r="6" fill="#E87461"/>
      <circle cx="10" cy="-25" r="5" fill="#c83232"/>
      <circle cx="-5" cy="-58" r="5" fill="#E87461"/>
      <circle cx="8" cy="-50" r="4" fill="#c83232"/>
      <!-- Suporte/estaca -->
      <line x1="2" y1="-65" x2="6" y2="-30" stroke="#a87545" stroke-width="1.5"/>
    </g>

    <!-- PIMENTÃO -->
    <g transform="translate(-100,-42)">
      <line x1="0" y1="0" x2="0" y2="-50" stroke="#4A7C59" stroke-width="3"/>
      <ellipse cx="-7" cy="-15" rx="8" ry="4" fill="#4A7C59" transform="rotate(-30 -7 -15)"/>
      <ellipse cx="8" cy="-30" rx="8" ry="4" fill="#5A9A6E" transform="rotate(30 8 -30)"/>
      <ellipse cx="-5" cy="-44" rx="7" ry="3.5" fill="#4A7C59" transform="rotate(-20 -5 -44)"/>
      <!-- Pimentões coloridos -->
      <path d="M-2 -22 Q -7 -18 -7 -12 Q -7 -8 -3 -8 L 3 -8 Q 7 -8 7 -12 Q 7 -18 2 -22 L 0 -25 Z" fill="#E87461"/>
      <path d="M5 -38 Q 0 -34 0 -28 Q 0 -24 4 -24 L 10 -24 Q 14 -24 14 -28 Q 14 -34 9 -38 L 7 -41 Z" fill="#E8C94A"/>
      <line x1="0" y1="-25" x2="0" y2="-22" stroke="#3D6849" stroke-width="1"/>
    </g>

    <!-- ABÓBORA grande -->
    <g transform="translate(-50,-42)">
      <line x1="0" y1="0" x2="0" y2="-22" stroke="#4A7C59" stroke-width="3"/>
      <ellipse cx="-8" cy="-18" rx="10" ry="5" fill="#4A7C59" transform="rotate(-25 -8 -18)"/>
      <ellipse cx="9" cy="-22" rx="10" ry="5" fill="#5A9A6E" transform="rotate(25 9 -22)"/>
      <circle cx="0" cy="-14" r="14" fill="#f57c00"/>
      <ellipse cx="0" cy="-14" rx="14" ry="14" fill="none"/>
      <path d="M-11 -18 Q -11 -14 -11 -10 M -6 -22 Q -6 -14 -6 -7 M 0 -23 Q 0 -14 0 -5 M 6 -22 Q 6 -14 6 -7 M 11 -18 Q 11 -14 11 -10" stroke="#c25a00" stroke-width="0.8" fill="none"/>
      <line x1="0" y1="-27" x2="-3" y2="-32" stroke="#4A7C59" stroke-width="2"/>
      <ellipse cx="2" cy="-32" rx="4" ry="2" fill="#5A9A6E" transform="rotate(30 2 -32)"/>
    </g>

    <!-- ALFACE com folhas amplas -->
    <g transform="translate(10,-42)">
      <line x1="0" y1="0" x2="0" y2="-12" stroke="#4A7C59" stroke-width="2"/>
      <ellipse cx="-10" cy="-14" rx="11" ry="6" fill="#5A9A6E"/>
      <ellipse cx="10" cy="-14" rx="11" ry="6" fill="#4A7C59"/>
      <ellipse cx="0" cy="-22" rx="14" ry="7" fill="#5A9A6E"/>
      <ellipse cx="-6" cy="-26" rx="8" ry="4" fill="#4A7C59"/>
      <ellipse cx="6" cy="-26" rx="8" ry="4" fill="#5A9A6E"/>
      <ellipse cx="0" cy="-30" rx="6" ry="3" fill="#3D6849"/>
    </g>

    <!-- CENOURA (2 fileiras) -->
    <g transform="translate(55,-42)">
      <path d="M-8 -10 L 8 -10 L 11 16 L -11 16 Z" fill="#f57c00"/>
      <path d="M-8 -10 L 8 -10 L 9 -4 L -9 -4 Z" fill="#FFA040" opacity="0.6"/>
      <path d="M-4 -10 Q -4 -18 -8 -22" stroke="#4A7C59" stroke-width="2.5" fill="none"/>
      <path d="M4 -10 Q 4 -18 8 -22" stroke="#4A7C59" stroke-width="2.5" fill="none"/>
      <path d="M0 -10 Q 0 -20 0 -24" stroke="#4A7C59" stroke-width="2.5" fill="none"/>
      <ellipse cx="-6" cy="-23" rx="4" ry="2" fill="#4A7C59" transform="rotate(-30 -6 -23)"/>
      <ellipse cx="6" cy="-23" rx="4" ry="2" fill="#5A9A6E" transform="rotate(30 6 -23)"/>
      <ellipse cx="0" cy="-26" rx="5" ry="2" fill="#4A7C59"/>
    </g>

    <!-- MILHO -->
    <g transform="translate(105,-42)">
      <line x1="0" y1="0" x2="0" y2="-75" stroke="#4A7C59" stroke-width="3"/>
      <path d="M0 -25 Q -15 -22 -22 -8" stroke="#5A9A6E" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M0 -35 Q 15 -32 22 -18" stroke="#4A7C59" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M0 -50 Q -12 -47 -18 -35" stroke="#5A9A6E" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M0 -60 Q 13 -56 19 -45" stroke="#4A7C59" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <!-- Espiga de milho -->
      <ellipse cx="0" cy="-50" rx="6" ry="14" fill="#E8C94A"/>
      <path d="M-3 -60 L -3 -38 M 3 -60 L 3 -38 M 0 -60 L 0 -38" stroke="#a78930" stroke-width="0.7"/>
      <!-- Cabelo de milho -->
      <path d="M-2 -62 Q -5 -68 -3 -72 M 0 -62 Q 0 -68 0 -75 M 2 -62 Q 5 -68 3 -72" stroke="#D4A54A" stroke-width="1" fill="none" opacity="0.7"/>
    </g>

    <!-- COUVE-FLOR -->
    <g transform="translate(150,-42)">
      <line x1="0" y1="0" x2="0" y2="-18" stroke="#4A7C59" stroke-width="2.5"/>
      <ellipse cx="-9" cy="-18" rx="9" ry="5" fill="#4A7C59" transform="rotate(-25 -9 -18)"/>
      <ellipse cx="9" cy="-18" rx="9" ry="5" fill="#5A9A6E" transform="rotate(25 9 -18)"/>
      <ellipse cx="-5" cy="-22" rx="7" ry="4" fill="#3D6849"/>
      <ellipse cx="5" cy="-22" rx="7" ry="4" fill="#4A7C59"/>
      <!-- Cabeça branca -->
      <circle cx="-4" cy="-28" r="6" fill="#fefdf6"/>
      <circle cx="4" cy="-28" r="6" fill="#fff8e0"/>
      <circle cx="0" cy="-32" r="6" fill="#fefdf6"/>
      <circle cx="-2" cy="-25" r="3.5" fill="#f8f1de"/>
      <circle cx="3" cy="-25" r="3.5" fill="#fff8e0"/>
    </g>

    <!-- REGADOR azul ao lado -->
    <g transform="translate(-160,-15)">
      <rect x="-12" y="-10" width="22" height="20" rx="3" fill="#5b9bd5"/>
      <rect x="-14" y="-13" width="10" height="4" rx="1" fill="#5b9bd5"/>
      <path d="M10 -5 L 24 -10 L 26 -6 L 12 -1 Z" fill="#5b9bd5"/>
      <rect x="23" y="-10" width="4" height="6" rx="1" fill="#2a4a6a"/>
      <!-- Gotinhas -->
      <ellipse cx="28" cy="2" rx="1.2" ry="2.5" fill="#7ccae0"/>
      <ellipse cx="30" cy="6" rx="1.2" ry="2.5" fill="#7ccae0"/>
    </g>

    <!-- BORBOLETA na horta -->
    <g transform="translate(60,-78)" fill="#8B6BAE" opacity="0.7">
      <ellipse cx="-5" cy="0" rx="6" ry="9" transform="rotate(-15)"/>
      <ellipse cx="5" cy="0" rx="6" ry="9" transform="rotate(15)"/>
      <rect x="-0.8" y="-3" width="1.5" height="10" rx="0.8" fill="#5a2f1c"/>
    </g>

    <!-- PLAQUINHA "HORTA" maior -->
    <g transform="translate(-150,-110)">
      <rect x="-2.5" y="0" width="5" height="30" fill="#5a3a23"/>
      <rect x="-38" y="-22" width="76" height="26" rx="3" fill="#fefdf6" stroke="#4A7C59" stroke-width="2"/>
      <text x="0" y="-9" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#4A7C59" letter-spacing="1.5">HORTA</text>
      <line x1="-22" y1="-5" x2="22" y2="-5" stroke="#D4A54A" stroke-width="1.5"/>
      <text x="0" y="0" text-anchor="middle" font-family="Inter,sans-serif" font-size="6" fill="#7a6a4a" font-style="italic" letter-spacing="0.5">pedagógica</text>
    </g>
  </g>
  <!-- children silhouettes with colored clothes -->
  <g transform="translate(350 580)">
    <!-- child 1 -->
    <circle cx="0" cy="-55" r="14" fill="#8B5E3C"/>
    <path d="M-14 -41 Q0 -35 14 -41 L16 -5 Q0 0 -16 -5Z" fill="#E87461"/>
    <rect x="-12" y="-5" width="9" height="25" rx="3" fill="#5a2f1c"/>
    <rect x="3" y="-5" width="9" height="25" rx="3" fill="#5a2f1c"/>
    <!-- child 2 -->
    <circle cx="50" cy="-50" r="12" fill="#D4A54A"/>
    <path d="M36 -38 Q50 -32 64 -38 L66 -5 Q50 0 34 -5Z" fill="#5B9BD5"/>
    <rect x="38" y="-5" width="8" height="22" rx="3" fill="#3d2415"/>
    <rect x="54" y="-5" width="8" height="22" rx="3" fill="#3d2415"/>
    <!-- child 3 -->
    <circle cx="100" cy="-52" r="13" fill="#6d4a2a"/>
    <path d="M87 -39 Q100 -33 113 -39 L115 -3 Q100 2 85 -3Z" fill="#4A7C59"/>
    <rect x="89" y="-3" width="8" height="23" rx="3" fill="#3d2415"/>
    <rect x="103" y="-3" width="8" height="23" rx="3" fill="#3d2415"/>
  </g>
  <!-- table with food -->
  <g transform="translate(500 620)">
    <rect x="-120" y="-20" width="240" height="12" rx="3" fill="#c8905d"/>
    <rect x="-100" y="-8" width="8" height="50" fill="#8B5E3C"/>
    <rect x="92" y="-8" width="8" height="50" fill="#8B5E3C"/>
    <!-- plates -->
    <ellipse cx="-60" cy="-28" rx="28" ry="10" fill="#fdf5e6"/>
    <circle cx="-65" cy="-32" r="5" fill="#E87461"/>
    <circle cx="-55" cy="-34" r="4" fill="#4A7C59"/>
    <circle cx="-62" cy="-28" r="4" fill="#D4A54A"/>
    <ellipse cx="0" cy="-28" rx="28" ry="10" fill="#fdf5e6"/>
    <circle cx="-5" cy="-32" r="5" fill="#8B5E3C"/>
    <circle cx="5" cy="-34" r="4" fill="#E8C94A"/>
    <circle cx="0" cy="-28" r="6" fill="#4A7C59"/>
    <ellipse cx="60" cy="-28" rx="28" ry="10" fill="#fdf5e6"/>
    <circle cx="55" cy="-32" r="5" fill="#E87461"/>
    <circle cx="65" cy="-30" r="5" fill="#D4A54A"/>
    <!-- juice glasses -->
    <rect x="-90" y="-42" width="10" height="16" rx="2" fill="#F5A08F" opacity="0.7"/>
    <rect x="80" y="-42" width="10" height="16" rx="2" fill="#E8C94A" opacity="0.7"/>
  </g>
</svg>