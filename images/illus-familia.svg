<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750">
  <defs>
    <linearGradient id="bg-fam" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf6e8"/>
      <stop offset="1" stop-color="#f5f0e6"/>
    </linearGradient>
    <linearGradient id="ceu-fam" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#cce8f2"/>
      <stop offset="1" stop-color="#fdf6e8"/>
    </linearGradient>
    <linearGradient id="terra-fam" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#E8C94A"/>
      <stop offset="1" stop-color="#D4A54A"/>
    </linearGradient>
  </defs>

  <rect width="600" height="750" fill="url(#bg-fam)"/>

  <!-- HEADER -->
  <text x="300" y="50" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" letter-spacing="3.5" fill="#7a6a4a">COMUNIDADE · CAPÍTULO 07</text>
  <text x="300" y="92" text-anchor="middle" font-family="Inter,sans-serif" font-size="32" font-weight="700" fill="#3a3a3a">Família e <tspan font-style="italic" fill="#4A7C59">território</tspan></text>

  <!-- ============ TRIÂNGULO DE CONEXÃO ============ -->
  <!-- Linhas conectoras (triângulo) -->
  <g stroke="#d4c8a8" stroke-width="2" stroke-dasharray="5,5" fill="none">
    <line x1="300" y1="200" x2="155" y2="380"/>
    <line x1="300" y1="200" x2="445" y2="380"/>
    <line x1="155" y1="380" x2="445" y2="380"/>
  </g>

  <!-- ============ VÉRTICE 1 — ESCOLA (TOPO) ============ -->
  <g transform="translate(300,180)">
    <!-- Círculo de fundo -->
    <circle cx="0" cy="0" r="68" fill="#cce8f2" stroke="#5b9bd5" stroke-width="2.5"/>
    <!-- Prédio escolar -->
    <g transform="translate(0,8)">
      <!-- Base do prédio -->
      <rect x="-40" y="-15" width="80" height="35" rx="2" fill="#fefdf6" stroke="#5b9bd5" stroke-width="1.5"/>
      <!-- Telhado -->
      <path d="M-44 -15 L 44 -15 L 32 -32 L -32 -32 Z" fill="#c83232"/>
      <!-- Mastro/bandeira -->
      <line x1="0" y1="-32" x2="0" y2="-48" stroke="#5a3a23" stroke-width="2"/>
      <path d="M0 -48 L 10 -45 L 10 -38 L 0 -41 Z" fill="#E8C94A"/>
      <!-- Porta -->
      <rect x="-6" y="2" width="12" height="18" rx="1" fill="#5a3a23"/>
      <circle cx="3" cy="11" r="0.8" fill="#D4A54A"/>
      <!-- Janelas -->
      <rect x="-30" y="-7" width="14" height="10" rx="1" fill="#7ccae0"/>
      <line x1="-23" y1="-7" x2="-23" y2="3" stroke="#fff" stroke-width="0.7"/>
      <line x1="-30" y1="-2" x2="-16" y2="-2" stroke="#fff" stroke-width="0.7"/>
      <rect x="16" y="-7" width="14" height="10" rx="1" fill="#7ccae0"/>
      <line x1="23" y1="-7" x2="23" y2="3" stroke="#fff" stroke-width="0.7"/>
      <line x1="16" y1="-2" x2="30" y2="-2" stroke="#fff" stroke-width="0.7"/>
    </g>
    <!-- Tag -->
    <rect x="-32" y="42" width="64" height="20" rx="10" fill="#5b9bd5"/>
    <text x="0" y="55" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#fff" letter-spacing="1">ESCOLA</text>
  </g>

  <!-- ============ VÉRTICE 2 — FAMÍLIA/LAR (INFERIOR ESQUERDO) ============ -->
  <g transform="translate(155,400)">
    <circle cx="0" cy="0" r="68" fill="#fdebe7" stroke="#E87461" stroke-width="2.5"/>
    <!-- Casa -->
    <g transform="translate(0,5)">
      <!-- Telhado -->
      <path d="M-35 -10 L 0 -38 L 35 -10 Z" fill="#c83232"/>
      <path d="M-30 -10 L 0 -32 L 30 -10 Z" fill="#E87461"/>
      <!-- Corpo da casa -->
      <rect x="-28" y="-10" width="56" height="30" fill="#fefdf6" stroke="#E87461" stroke-width="1.5"/>
      <!-- Chaminé -->
      <rect x="14" y="-32" width="6" height="10" fill="#8b6238"/>
      <!-- Porta -->
      <rect x="-5" y="4" width="10" height="16" rx="1" fill="#8b6238"/>
      <circle cx="3" cy="12" r="0.7" fill="#D4A54A"/>
      <!-- Janela -->
      <rect x="-22" y="-4" width="10" height="10" rx="1" fill="#E8C94A"/>
      <line x1="-17" y1="-4" x2="-17" y2="6" stroke="#a87545" stroke-width="0.7"/>
      <line x1="-22" y1="1" x2="-12" y2="1" stroke="#a87545" stroke-width="0.7"/>
      <rect x="12" y="-4" width="10" height="10" rx="1" fill="#E8C94A"/>
      <line x1="17" y1="-4" x2="17" y2="6" stroke="#a87545" stroke-width="0.7"/>
      <line x1="12" y1="1" x2="22" y2="1" stroke="#a87545" stroke-width="0.7"/>
      <!-- Coração na frente da casa -->
      <path d="M0 -18 Q -4 -22 -7 -18 Q -7 -14 0 -10 Q 7 -14 7 -18 Q 4 -22 0 -18 Z" fill="#E87461"/>
    </g>
    <!-- Tag -->
    <rect x="-32" y="42" width="64" height="20" rx="10" fill="#E87461"/>
    <text x="0" y="55" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#fff" letter-spacing="1">FAMÍLIA</text>
  </g>

  <!-- ============ VÉRTICE 3 — TERRITÓRIO/CERRADO (INFERIOR DIREITO) ============ -->
  <g transform="translate(445,400)">
    <circle cx="0" cy="0" r="68" fill="#e8f5ed" stroke="#4A7C59" stroke-width="2.5"/>
    <g transform="translate(0,5)">
      <!-- Solo -->
      <ellipse cx="0" cy="22" rx="50" ry="6" fill="#8b6238"/>
      <ellipse cx="0" cy="21" rx="48" ry="4" fill="#a87545"/>
      <!-- Buriti (palmeira do Cerrado) -->
      <line x1="-25" y1="22" x2="-25" y2="-10" stroke="#5a3a23" stroke-width="3"/>
      <path d="M-25 -10 Q -38 -18 -42 -14 M -25 -10 Q -12 -18 -8 -14 M -25 -10 Q -32 -24 -37 -28 M -25 -10 Q -18 -24 -13 -28 M -25 -10 Q -25 -28 -25 -34" stroke="#4A7C59" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Frutos de buriti -->
      <circle cx="-29" cy="-12" r="2.5" fill="#E87461"/>
      <circle cx="-21" cy="-12" r="2.5" fill="#E87461"/>
      <!-- Pé de feijão/canteiro -->
      <line x1="0" y1="22" x2="0" y2="8" stroke="#4A7C59" stroke-width="2"/>
      <ellipse cx="-4" cy="5" rx="5" ry="3" fill="#4A7C59" transform="rotate(-30 -4 5)"/>
      <ellipse cx="4" cy="0" rx="5" ry="3" fill="#5A9A6E" transform="rotate(30 4 0)"/>
      <ellipse cx="-3" cy="-5" rx="5" ry="2.5" fill="#4A7C59" transform="rotate(-15 -3 -5)"/>
      <!-- Tomateiro -->
      <line x1="20" y1="22" x2="20" y2="0" stroke="#4A7C59" stroke-width="2"/>
      <ellipse cx="15" cy="-3" rx="6" ry="3" fill="#5A9A6E" transform="rotate(-25 15 -3)"/>
      <ellipse cx="25" cy="-6" rx="6" ry="3" fill="#4A7C59" transform="rotate(25 25 -6)"/>
      <circle cx="20" cy="-8" r="4" fill="#E87461"/>
      <circle cx="14" cy="0" r="3" fill="#c83232"/>
      <!-- Sol -->
      <circle cx="36" cy="-24" r="9" fill="#E8C94A"/>
      <g stroke="#D4A54A" stroke-width="1.5" stroke-linecap="round">
        <line x1="36" y1="-38" x2="36" y2="-36"/>
        <line x1="48" y1="-24" x2="46" y2="-24"/>
        <line x1="44" y1="-32" x2="42" y2="-30"/>
      </g>
    </g>
    <!-- Tag -->
    <rect x="-44" y="42" width="88" height="20" rx="10" fill="#4A7C59"/>
    <text x="0" y="55" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#fff" letter-spacing="1">TERRITÓRIO</text>
  </g>

  <!-- ============ ESTUDANTE NO CENTRO ============ -->
  <g transform="translate(300,360)">
    <!-- Corpo (uniforme escolar com gola branca) -->
    <path d="M-22 8 L 22 8 L 28 38 L -28 38 Z" fill="#5b9bd5"/>
    <!-- Gola/colarinho -->
    <path d="M-10 8 L 0 18 L 10 8 L 6 6 L 0 12 L -6 6 Z" fill="#fff"/>
    <!-- Gravata vermelha -->
    <path d="M-2 14 L 2 14 L 4 28 L 0 32 L -4 28 Z" fill="#E87461"/>
    <!-- Mochila atrás -->
    <path d="M-26 16 Q -32 18 -32 28 L -32 36 Q -28 38 -22 36 L -22 18 Z" fill="#D4A54A"/>
    <rect x="-30" y="22" width="6" height="3" rx="1" fill="#a87545"/>
    <!-- Braço direito com livro -->
    <path d="M22 14 Q 30 18 32 28" stroke="#5b9bd5" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Mão -->
    <circle cx="32" cy="28" r="4" fill="#fdc998"/>
    <!-- Livro -->
    <rect x="28" y="28" width="18" height="13" rx="1" fill="#4A7C59"/>
    <rect x="30" y="30" width="14" height="2" fill="#7CB98A"/>
    <rect x="30" y="34" width="14" height="2" fill="#fff" opacity="0.7"/>
    <rect x="30" y="37" width="14" height="2" fill="#fff" opacity="0.7"/>
    <!-- Pescoço -->
    <path d="M-5 4 L 5 4 L 6 10 L -6 10 Z" fill="#d8a878"/>
    <!-- Cabeça oval -->
    <ellipse cx="0" cy="-10" rx="14" ry="16" fill="#fdc998"/>
    <!-- Orelhas -->
    <ellipse cx="-14" cy="-10" rx="2.5" ry="3.5" fill="#d8a878"/>
    <ellipse cx="14" cy="-10" rx="2.5" ry="3.5" fill="#d8a878"/>
    <!-- Cabelo curto -->
    <path d="M-14 -18 Q -16 -28 0 -28 Q 16 -28 14 -18 L 13 -10 Q 8 -16 0 -16 Q -8 -16 -13 -10 Z" fill="#5a3a23"/>
    <path d="M-13 -16 Q -8 -10 -2 -14 L 0 -18 Q -8 -20 -13 -16 Z" fill="#3a1f10"/>
    <!-- Sobrancelhas -->
    <path d="M-7 -14 Q -5 -16 -2 -14" stroke="#3a1f10" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <path d="M2 -14 Q 5 -16 7 -14" stroke="#3a1f10" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <!-- Olhos simples (sem íris exagerada) -->
    <ellipse cx="-4" cy="-10" rx="1.6" ry="2" fill="#3a1f10"/>
    <ellipse cx="4" cy="-10" rx="1.6" ry="2" fill="#3a1f10"/>
    <!-- Nariz sutil -->
    <path d="M-1 -7 Q 0 -5 1 -7" stroke="#c89875" stroke-width="0.8" fill="none"/>
    <!-- Bochechas -->
    <circle cx="-9" cy="-5" r="2" fill="#E87461" opacity="0.32"/>
    <circle cx="9" cy="-5" r="2" fill="#E87461" opacity="0.32"/>
    <!-- Sorriso -->
    <path d="M-4 -3 Q 0 1 4 -3" stroke="#7a2a20" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- Tag "ESTUDANTE" abaixo -->
    <rect x="-44" y="44" width="88" height="18" rx="9" fill="#3a3a3a"/>
    <text x="0" y="56" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fff" letter-spacing="1.5">ESTUDANTE</text>
  </g>

  <!-- Setas indicando "fluxo" para a criança no centro -->
  <g fill="#7a6a4a" opacity="0.6">
    <path d="M278 245 L 287 252 L 282 252 L 282 258 L 274 258 L 274 252 L 269 252 Z" transform="rotate(135 278 250)"/>
    <path d="M205 365 L 214 372 L 209 372 L 209 378 L 201 378 L 201 372 L 196 372 Z" transform="rotate(45 205 370)"/>
    <path d="M395 365 L 404 372 L 399 372 L 399 378 L 391 378 L 391 372 L 386 372 Z" transform="rotate(-45 395 370)"/>
  </g>

  <!-- ============ 3 BADGES — PRINCÍPIOS ============ -->
  <g transform="translate(40,510)">
    <!-- DIÁLOGO -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="170" height="140" rx="14" fill="#cce8f2" stroke="#5b9bd5" stroke-width="2"/>
      <rect x="0" y="0" width="170" height="6" rx="3" fill="#5b9bd5"/>
      <g transform="translate(85,55)">
        <!-- Balões de fala -->
        <path d="M-22 -10 Q -22 -22 -10 -22 L 6 -22 Q 18 -22 18 -10 Q 18 0 6 0 L -8 0 L -16 6 L -14 0 Q -22 0 -22 -10 Z" fill="#5b9bd5"/>
        <path d="M2 8 Q 2 -2 14 -2 L 22 -2 Q 30 -2 30 8 Q 30 14 22 14 L 18 14 L 24 18 L 18 16 Q 2 16 2 8 Z" fill="#fff" stroke="#5b9bd5" stroke-width="1.5"/>
      </g>
      <text x="85" y="102" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#2a4a6a">DIÁLOGO</text>
      <text x="85" y="120" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#5b9bd5">Reuniões, escutas</text>
    </g>

    <!-- AGRICULTURA FAMILIAR -->
    <g transform="translate(175,0)">
      <rect x="0" y="0" width="170" height="140" rx="14" fill="#e8f5ed" stroke="#7CB98A" stroke-width="2"/>
      <rect x="0" y="0" width="170" height="6" rx="3" fill="#4A7C59"/>
      <g transform="translate(85,55)">
        <!-- Cesta de feira -->
        <path d="M-22 -8 Q 0 -16 22 -8 L 18 8 L -18 8 Z" fill="#a87545"/>
        <path d="M-22 -8 Q 0 -16 22 -8 L 18 -5 L -18 -5 Z" fill="#c8905d"/>
        <ellipse cx="0" cy="-12" rx="22" ry="3" fill="#8b6238"/>
        <!-- Frutas -->
        <circle cx="-10" cy="-13" r="5" fill="#c83232"/>
        <circle cx="0" cy="-15" r="5" fill="#D4A54A"/>
        <circle cx="10" cy="-13" r="5" fill="#4A7C59"/>
        <!-- Alça -->
        <path d="M-18 -10 Q 0 -25 18 -10" stroke="#5a3a23" stroke-width="2" fill="none"/>
      </g>
      <text x="85" y="102" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#2d5a3a">AGRICULTURA</text>
      <text x="85" y="118" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#2d5a3a">FAMILIAR</text>
    </g>

    <!-- CULTURA ALIMENTAR -->
    <g transform="translate(350,0)">
      <rect x="0" y="0" width="170" height="140" rx="14" fill="#fdf6e0" stroke="#E8C94A" stroke-width="2"/>
      <rect x="0" y="0" width="170" height="6" rx="3" fill="#D4A54A"/>
      <g transform="translate(85,58)">
        <!-- Panela de barro brasileira -->
        <ellipse cx="0" cy="10" rx="28" ry="4" fill="#5a3a23"/>
        <path d="M-26 8 Q -26 -8 -22 -10 L 22 -10 Q 26 -8 26 8 Z" fill="#8B5E3C"/>
        <path d="M-26 8 Q -26 -8 -22 -10 L 22 -10 Q 26 -8 26 8 Z" fill="none" stroke="#5a3a23" stroke-width="1"/>
        <!-- Alças -->
        <path d="M-26 -4 Q -32 -4 -32 0" stroke="#5a3a23" stroke-width="2.5" fill="none"/>
        <path d="M26 -4 Q 32 -4 32 0" stroke="#5a3a23" stroke-width="2.5" fill="none"/>
        <!-- Tampa/borda -->
        <ellipse cx="0" cy="-10" rx="22" ry="3" fill="#a87545"/>
        <!-- Comida saindo -->
        <ellipse cx="0" cy="-10" rx="18" ry="2" fill="#E87461"/>
        <!-- Colher de pau saindo -->
        <line x1="14" y1="-10" x2="22" y2="-22" stroke="#a87545" stroke-width="3" stroke-linecap="round"/>
        <ellipse cx="22" cy="-22" rx="4" ry="2.5" fill="#a87545" transform="rotate(45 22 -22)"/>
        <!-- Vapor -->
        <path d="M-6 -14 Q -6 -22 -2 -24 Q -2 -28 2 -28" stroke="#aaa" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M4 -14 Q 4 -22 8 -24 Q 8 -28 12 -28" stroke="#aaa" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
        <!-- Coração ao lado (afeto) -->
        <path d="M-32 -16 Q -34 -19 -36 -16 Q -36 -13 -32 -10 Q -28 -13 -28 -16 Q -30 -19 -32 -16 Z" fill="#E87461" opacity="0.85"/>
      </g>
      <text x="85" y="102" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#8a6a20">CULTURA</text>
      <text x="85" y="118" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#8a6a20">ALIMENTAR</text>
    </g>
  </g>

  <!-- RODAPÉ -->
  <text x="300" y="685" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#3a3a3a" font-style="italic">"O triângulo que alimenta a infância."</text>
  <text x="300" y="715" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="2.5" fill="#7a6a4a">FAMÍLIA · ESCOLA · TERRITÓRIO · PAE-DF</text>
</svg>
