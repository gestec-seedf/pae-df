<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg-bncc" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#eef7f0"/>
      <stop offset="1" stop-color="#fdf6e8"/>
    </linearGradient>
    <radialGradient id="ball-purple" cx="40%" cy="35%">
      <stop offset="0" stop-color="#b69ad0"/>
      <stop offset="1" stop-color="#8B6BAE"/>
    </radialGradient>
    <radialGradient id="ball-sky" cx="40%" cy="35%">
      <stop offset="0" stop-color="#9ec5e8"/>
      <stop offset="1" stop-color="#5B9BD5"/>
    </radialGradient>
    <radialGradient id="ball-green" cx="40%" cy="35%">
      <stop offset="0" stop-color="#7CB98A"/>
      <stop offset="1" stop-color="#4A7C59"/>
    </radialGradient>
    <radialGradient id="ball-gold" cx="40%" cy="35%">
      <stop offset="0" stop-color="#e8c476"/>
      <stop offset="1" stop-color="#D4A54A"/>
    </radialGradient>
    <radialGradient id="ball-coral" cx="40%" cy="35%">
      <stop offset="0" stop-color="#f1a092"/>
      <stop offset="1" stop-color="#E87461"/>
    </radialGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bg-bncc)"/>

  <!-- HEADER -->
  <text x="300" y="48" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" letter-spacing="3.5" fill="#7a6a4a">BNCC · EDUCAÇÃO INFANTIL</text>
  <text x="300" y="86" text-anchor="middle" font-family="Inter,sans-serif" font-size="28" font-weight="700" fill="#3a3a3a">Cinco <tspan font-style="italic" fill="#4A7C59">Campos de Experiência</tspan></text>

  <!-- TRUNK -->
  <rect x="288" y="380" width="24" height="160" rx="8" fill="#8B5E3C"/>
  <rect x="284" y="380" width="32" height="12" rx="4" fill="#6e4828"/>

  <!-- ROOTS -->
  <g stroke="#8B5E3C" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M300 540 Q260 565 215 575"/>
    <path d="M300 540 Q280 570 250 585"/>
    <path d="M300 540 Q320 570 350 585"/>
    <path d="M300 540 Q340 565 385 575"/>
  </g>

  <!-- BRANCHES (curvas que saem do topo do tronco) -->
  <g stroke="#8B5E3C" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M300 380 Q220 320 130 250"/>
    <path d="M300 380 Q230 290 160 165"/>
    <path d="M300 380 Q300 280 300 140"/>
    <path d="M300 380 Q370 290 440 165"/>
    <path d="M300 380 Q380 320 470 250"/>
  </g>

  <!-- BALL 1 (esquerda baixo): Eu, outro, nós - roxo -->
  <g transform="translate(115,235)">
    <circle r="65" fill="url(#ball-purple)"/>
    <circle cx="0" cy="-8" r="34" fill="none" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <!-- 3 figurinhas -->
    <circle cx="-15" cy="-18" r="6" fill="#fff" opacity="0.95"/>
    <circle cx="0" cy="-22" r="7" fill="#fff" opacity="0.95"/>
    <circle cx="15" cy="-18" r="6" fill="#fff" opacity="0.95"/>
    <text y="14" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#fff">EU, OUTRO,</text>
    <text y="28" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#fff">NÓS</text>
  </g>

  <!-- BALL 2 (esquerda alto): Escuta, fala - azul -->
  <g transform="translate(145,150)">
    <circle r="60" fill="url(#ball-sky)"/>
    <circle cx="0" cy="-8" r="32" fill="none" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <!-- balão fala -->
    <path d="M-14 -18 Q-14 -28 -2 -28 L 12 -28 Q 18 -28 18 -22 L 18 -14 Q 18 -8 12 -8 L 4 -8 L 0 -2 L 0 -8 L -2 -8 Q -14 -8 -14 -14 Z" fill="#fff" opacity="0.95"/>
    <text y="14" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#fff">ESCUTA,</text>
    <text y="28" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#fff">FALA</text>
  </g>

  <!-- BALL 3 (topo central): Espaços, tempos - verde -->
  <g transform="translate(300,125)">
    <circle r="62" fill="url(#ball-green)"/>
    <circle cx="0" cy="-10" r="34" fill="none" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <!-- relógio -->
    <circle cx="0" cy="-18" r="14" fill="none" stroke="#fff" stroke-width="2.5"/>
    <line x1="0" y1="-18" x2="0" y2="-26" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-18" x2="8" y2="-14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <text y="14" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#fff">ESPAÇOS,</text>
    <text y="28" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#fff">TEMPOS</text>
  </g>

  <!-- BALL 4 (direita alto): Traços, sons, cores - ouro -->
  <g transform="translate(455,150)">
    <circle r="60" fill="url(#ball-gold)"/>
    <circle cx="0" cy="-8" r="32" fill="none" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <!-- paleta/pincel -->
    <path d="M-10 -22 Q-10 -32 0 -32 Q 10 -32 10 -22 L 10 -14 Q 10 -10 4 -10 L -4 -10 Q -10 -10 -10 -14 Z" fill="#fff" opacity="0.95"/>
    <circle cx="-4" cy="-22" r="2" fill="#E87461"/>
    <circle cx="4" cy="-22" r="2" fill="#4A7C59"/>
    <circle cx="0" cy="-16" r="2" fill="#5B9BD5"/>
    <text y="14" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#fff">TRAÇOS, SONS</text>
    <text y="28" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#fff">CORES</text>
  </g>

  <!-- BALL 5 (direita baixo): Corpo, gestos - coral -->
  <g transform="translate(485,235)">
    <circle r="65" fill="url(#ball-coral)"/>
    <circle cx="0" cy="-8" r="34" fill="none" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <!-- bonequinho -->
    <circle cx="0" cy="-22" r="6" fill="#fff" opacity="0.95"/>
    <path d="M-2 -16 L 2 -16 L 6 -2 L -6 -2 Z" fill="#fff" opacity="0.95"/>
    <line x1="-8" y1="-12" x2="-12" y2="-4" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
    <line x1="8" y1="-12" x2="12" y2="-4" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
    <text y="14" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#fff">CORPO,</text>
    <text y="28" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#fff">GESTOS</text>
  </g>

  <!-- ROOTS LABEL -->
  <text x="300" y="585" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#8B5E3C">6 DIREITOS DE APRENDIZAGEM</text>
</svg>
