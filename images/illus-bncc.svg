<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg-bncc" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#eef7f0"/>
      <stop offset="1" stop-color="#fdf6e8"/>
    </linearGradient>
    <radialGradient id="ball-purple" cx="40%" cy="35%">
      <stop offset="0" stop-color="#b69ad0"/>
      <stop offset="1" stop-color="#8B6BAE"/>
    </radialGradient>
    <radialGradient id="ball-sky" cx="40%" cy="35%">
      <stop offset="0" stop-color="#9ec5e8"/>
      <stop offset="1" stop-color="#5B9BD5"/>
    </radialGradient>
    <radialGradient id="ball-green" cx="40%" cy="35%">
      <stop offset="0" stop-color="#7CB98A"/>
      <stop offset="1" stop-color="#4A7C59"/>
    </radialGradient>
    <radialGradient id="ball-gold" cx="40%" cy="35%">
      <stop offset="0" stop-color="#e8c476"/>
      <stop offset="1" stop-color="#D4A54A"/>
    </radialGradient>
    <radialGradient id="ball-coral" cx="40%" cy="35%">
      <stop offset="0" stop-color="#f1a092"/>
      <stop offset="1" stop-color="#E87461"/>
    </radialGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bg-bncc)"/>

  <!-- HEADER -->
  <text x="300" y="36" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" letter-spacing="3.5" fill="#7a6a4a">BNCC · EDUCAÇÃO INFANTIL</text>
  <text x="300" y="74" text-anchor="middle" font-family="Inter,sans-serif" font-size="26" font-weight="700" fill="#3a3a3a">Cinco <tspan font-style="italic" fill="#4A7C59">Campos de Experiência</tspan></text>

  <!-- TRUNK -->
  <rect x="288" y="385" width="24" height="125" rx="8" fill="#8B5E3C"/>
  <rect x="284" y="385" width="32" height="12" rx="4" fill="#6e4828"/>

  <!-- ROOTS -->
  <g stroke="#8B5E3C" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M300 510 Q260 530 220 540"/>
    <path d="M300 510 Q280 535 250 548"/>
    <path d="M300 510 Q320 535 350 548"/>
    <path d="M300 510 Q340 530 380 540"/>
  </g>

  <!-- BRANCHES -->
  <g stroke="#8B5E3C" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M300 385 Q205 360 95 320"/>
    <path d="M300 385 Q210 320 125 215"/>
    <path d="M300 385 Q300 305 300 195"/>
    <path d="M300 385 Q390 320 475 215"/>
    <path d="M300 385 Q395 360 505 320"/>
  </g>

  <!-- BALL 1 (extrema esquerda baixo): Eu, outro, nós -->
  <g transform="translate(85,310)">
    <circle r="50" fill="url(#ball-purple)"/>
    <circle cx="0" cy="-6" r="25" fill="none" stroke="#fff" stroke-width="1.8" opacity="0.4"/>
    <circle cx="-12" cy="-14" r="4.5" fill="#fff" opacity="0.95"/>
    <circle cx="0" cy="-17" r="5" fill="#fff" opacity="0.95"/>
    <circle cx="12" cy="-14" r="4.5" fill="#fff" opacity="0.95"/>
    <text y="11" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fff">EU, OUTRO,</text>
    <text y="24" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#fff">NÓS</text>
  </g>

  <!-- BALL 2 (esquerda alto): Escuta, fala -->
  <g transform="translate(115,205)">
    <circle r="46" fill="url(#ball-sky)"/>
    <circle cx="0" cy="-6" r="23" fill="none" stroke="#fff" stroke-width="1.8" opacity="0.4"/>
    <path d="M-11 -16 Q-11 -22 -2 -22 L 9 -22 Q 14 -22 14 -17 L 14 -12 Q 14 -7 9 -7 L 2 -7 L -2 -3 L -2 -7 Q -11 -7 -11 -12 Z" fill="#fff" opacity="0.95"/>
    <text y="9" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fff">ESCUTA,</text>
    <text y="22" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#fff">FALA</text>
  </g>

  <!-- BALL 3 (topo central): Espaços, tempos -->
  <g transform="translate(300,180)">
    <circle r="52" fill="url(#ball-green)"/>
    <circle cx="0" cy="-6" r="26" fill="none" stroke="#fff" stroke-width="1.8" opacity="0.4"/>
    <circle cx="0" cy="-14" r="11" fill="none" stroke="#fff" stroke-width="2.2"/>
    <line x1="0" y1="-14" x2="0" y2="-20" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="0" y1="-14" x2="6" y2="-10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
    <text y="11" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fff">ESPAÇOS,</text>
    <text y="24" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#fff">TEMPOS</text>
  </g>

  <!-- BALL 4 (direita alto): Traços, sons, cores -->
  <g transform="translate(485,205)">
    <circle r="46" fill="url(#ball-gold)"/>
    <circle cx="0" cy="-6" r="23" fill="none" stroke="#fff" stroke-width="1.8" opacity="0.4"/>
    <path d="M-9 -20 Q-9 -27 0 -27 Q 9 -27 9 -20 L 9 -13 Q 9 -9 4 -9 L -4 -9 Q -9 -9 -9 -13 Z" fill="#fff" opacity="0.9"/>
    <circle cx="-4" cy="-20" r="1.6" fill="#E87461"/>
    <circle cx="4" cy="-20" r="1.6" fill="#4A7C59"/>
    <circle cx="0" cy="-14" r="1.6" fill="#5B9BD5"/>
    <text y="2" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#fff">TRAÇOS,</text>
    <text y="14" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#fff">SONS,</text>
    <text y="26" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fff">CORES</text>
  </g>

  <!-- BALL 5 (extrema direita baixo): Corpo, gestos -->
  <g transform="translate(515,310)">
    <circle r="50" fill="url(#ball-coral)"/>
    <circle cx="0" cy="-6" r="25" fill="none" stroke="#fff" stroke-width="1.8" opacity="0.4"/>
    <circle cx="0" cy="-18" r="4.5" fill="#fff" opacity="0.95"/>
    <path d="M-2 -14 L 2 -14 L 5 -3 L -5 -3 Z" fill="#fff" opacity="0.95"/>
    <line x1="-5" y1="-10" x2="-9" y2="-3" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
    <line x1="5" y1="-10" x2="9" y2="-3" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
    <text y="11" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#fff">CORPO,</text>
    <text y="24" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#fff">GESTOS</text>
  </g>

  <!-- ROOTS LABEL -->
  <rect x="170" y="560" width="260" height="32" rx="16" fill="#8B5E3C" opacity="0.12"/>
  <text x="300" y="581" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#5a3a23">6 DIREITOS DE APRENDIZAGEM</text>
</svg>
