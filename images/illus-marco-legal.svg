<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750">
  <defs>
    <linearGradient id="bg-marco" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf6e8"/>
      <stop offset="1" stop-color="#f5f0e6"/>
    </linearGradient>
    <linearGradient id="capa-1" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#8B5E3C"/>
      <stop offset="1" stop-color="#a87545"/>
    </linearGradient>
    <linearGradient id="capa-2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#5b9bd5"/>
      <stop offset="1" stop-color="#7ccae0"/>
    </linearGradient>
    <linearGradient id="capa-3" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#4A7C59"/>
      <stop offset="1" stop-color="#5A9A6E"/>
    </linearGradient>
    <linearGradient id="capa-4" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#D4A54A"/>
      <stop offset="1" stop-color="#E8C94A"/>
    </linearGradient>
    <linearGradient id="capa-5" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#E87461"/>
      <stop offset="1" stop-color="#F5A08F"/>
    </linearGradient>
  </defs>

  <rect width="600" height="750" fill="url(#bg-marco)"/>

  <!-- HEADER -->
  <text x="300" y="50" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" letter-spacing="3.5" fill="#7a6a4a">FUNDAMENTOS · CAPÍTULO 01</text>
  <text x="300" y="92" text-anchor="middle" font-family="Inter,sans-serif" font-size="32" font-weight="700" fill="#3a3a3a">Marco legal do <tspan font-style="italic" fill="#5b9bd5">PNAE</tspan></text>

  <!-- ============ PILHA DE LIVROS/LEIS (esquerda) ============ -->
  <g transform="translate(50,160)">
    <!-- Sombra da pilha -->
    <ellipse cx="135" cy="340" rx="140" ry="10" fill="#8B5E3C" opacity="0.15"/>

    <!-- Livro 6 — Res. FNDE 4/2026 (topo) -->
    <g transform="translate(0,40)">
      <rect x="0" y="0" width="270" height="34" rx="3" fill="url(#capa-5)"/>
      <rect x="0" y="0" width="270" height="4" fill="#7a2a20"/>
      <rect x="0" y="30" width="270" height="4" fill="#7a2a20"/>
      <line x1="6" y1="6" x2="6" y2="28" stroke="#7a2a20" stroke-width="1"/>
      <text x="20" y="16" font-family="Inter,sans-serif" font-size="9" font-weight="700" letter-spacing="1" fill="#fff">RES. FNDE Nº 4</text>
      <text x="20" y="28" font-family="Inter,sans-serif" font-size="8" fill="#fdebe7">Cardápios EI · 2026</text>
      <!-- Estrela -->
      <path d="M250 17 L 254 22 L 260 23 L 256 27 L 257 33 L 250 30 L 243 33 L 244 27 L 240 23 L 246 22 Z" fill="#fff" opacity="0.9"/>
    </g>

    <!-- Livro 5 — BNCC 2018 -->
    <g transform="translate(20,90)">
      <rect x="0" y="0" width="260" height="34" rx="3" fill="url(#capa-4)"/>
      <rect x="0" y="0" width="260" height="4" fill="#8a6a20"/>
      <rect x="0" y="30" width="260" height="4" fill="#8a6a20"/>
      <line x1="6" y1="6" x2="6" y2="28" stroke="#8a6a20" stroke-width="1"/>
      <text x="20" y="16" font-family="Inter,sans-serif" font-size="9" font-weight="700" letter-spacing="1" fill="#fff">BNCC</text>
      <text x="20" y="28" font-family="Inter,sans-serif" font-size="8" fill="#fdf6e0">Base Curricular · 2018</text>
    </g>

    <!-- Livro 4 — Lei 11.947 PNAE 2009 -->
    <g transform="translate(0,140)">
      <rect x="0" y="0" width="270" height="36" rx="3" fill="url(#capa-3)"/>
      <rect x="0" y="0" width="270" height="4" fill="#2d5a3a"/>
      <rect x="0" y="32" width="270" height="4" fill="#2d5a3a"/>
      <line x1="6" y1="6" x2="6" y2="30" stroke="#2d5a3a" stroke-width="1"/>
      <text x="20" y="17" font-family="Inter,sans-serif" font-size="10" font-weight="700" letter-spacing="1" fill="#fff">LEI 11.947</text>
      <text x="20" y="29" font-family="Inter,sans-serif" font-size="8" fill="#e8f5ed">Lei do PNAE · 2009</text>
      <path d="M248 18 L 252 22 L 258 23 L 254 27 L 255 33 L 248 30 L 241 33 L 242 27 L 238 23 L 244 22 Z" fill="#fff" opacity="0.9"/>
    </g>

    <!-- Livro 3 — LOSAN 2006 -->
    <g transform="translate(10,192)">
      <rect x="0" y="0" width="265" height="34" rx="3" fill="url(#capa-2)"/>
      <rect x="0" y="0" width="265" height="4" fill="#2d6a8a"/>
      <rect x="0" y="30" width="265" height="4" fill="#2d6a8a"/>
      <line x1="6" y1="6" x2="6" y2="28" stroke="#2d6a8a" stroke-width="1"/>
      <text x="20" y="16" font-family="Inter,sans-serif" font-size="9" font-weight="700" letter-spacing="1" fill="#fff">LOSAN · LEI 11.346</text>
      <text x="20" y="28" font-family="Inter,sans-serif" font-size="8" fill="#cce8f2">Direito à alimentação · 2006</text>
    </g>

    <!-- Livro 2 — LDB 1996 -->
    <g transform="translate(5,242)">
      <rect x="0" y="0" width="268" height="36" rx="3" fill="url(#capa-1)"/>
      <rect x="0" y="0" width="268" height="4" fill="#5a3a23"/>
      <rect x="0" y="32" width="268" height="4" fill="#5a3a23"/>
      <line x1="6" y1="6" x2="6" y2="30" stroke="#5a3a23" stroke-width="1"/>
      <text x="20" y="17" font-family="Inter,sans-serif" font-size="10" font-weight="700" letter-spacing="1" fill="#fff">LDB · LEI 9.394</text>
      <text x="20" y="29" font-family="Inter,sans-serif" font-size="8" fill="#f5d4b0">Lei de Diretrizes · 1996</text>
    </g>

    <!-- Livro 1 — Constituição Federal (base, mais grosso) -->
    <g transform="translate(0,294)">
      <rect x="0" y="0" width="270" height="42" rx="3" fill="#2a4a6a"/>
      <rect x="0" y="0" width="270" height="5" fill="#1f3a5a"/>
      <rect x="0" y="37" width="270" height="5" fill="#1f3a5a"/>
      <line x1="7" y1="7" x2="7" y2="35" stroke="#D4A54A" stroke-width="2"/>
      <line x1="11" y1="7" x2="11" y2="35" stroke="#D4A54A" stroke-width="1"/>
      <text x="22" y="19" font-family="Inter,sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="#fff">CONSTITUIÇÃO</text>
      <text x="22" y="33" font-family="Inter,sans-serif" font-size="9" fill="#D4A54A">FEDERAL · 1988 · ART. 6º E 208</text>
      <!-- Selo dourado -->
      <circle cx="246" cy="21" r="11" fill="#D4A54A"/>
      <circle cx="246" cy="21" r="8" fill="#E8C94A"/>
      <path d="M246 14 L 248 19 L 253 19 L 249 22 L 250 27 L 246 24 L 242 27 L 243 22 L 239 19 L 244 19 Z" fill="#fff"/>
    </g>
  </g>

  <!-- ============ BALANÇA DA JUSTIÇA (lateral direita) ============ -->
  <g transform="translate(450,310)">
    <!-- Base -->
    <ellipse cx="0" cy="155" rx="40" ry="6" fill="#5a3a23" opacity="0.2"/>
    <rect x="-25" y="135" width="50" height="20" rx="3" fill="#3a3a3a"/>
    <rect x="-30" y="130" width="60" height="8" rx="2" fill="#2a2a2a"/>
    <!-- Poste -->
    <rect x="-3" y="-40" width="6" height="175" fill="#3a3a3a"/>
    <!-- Topo do poste (ornamento) -->
    <circle cx="0" cy="-45" r="6" fill="#D4A54A"/>
    <circle cx="0" cy="-45" r="4" fill="#E8C94A"/>
    <!-- Travessão -->
    <rect x="-60" y="-32" width="120" height="5" rx="2" fill="#3a3a3a"/>
    <!-- Cordas -->
    <line x1="-55" y1="-27" x2="-55" y2="0" stroke="#5a3a23" stroke-width="1.5"/>
    <line x1="55" y1="-27" x2="55" y2="0" stroke="#5a3a23" stroke-width="1.5"/>
    <!-- Prato esquerdo (alimentação) -->
    <ellipse cx="-55" cy="5" rx="32" ry="5" fill="#D4A54A"/>
    <ellipse cx="-55" cy="3" rx="30" ry="4" fill="#E8C94A"/>
    <!-- Comida no prato esquerdo -->
    <circle cx="-65" cy="-1" r="4" fill="#E87461"/>
    <circle cx="-55" cy="-3" r="4" fill="#4A7C59"/>
    <circle cx="-45" cy="-1" r="4" fill="#D4A54A"/>
    <!-- Prato direito (livro/lei) -->
    <ellipse cx="55" cy="5" rx="32" ry="5" fill="#D4A54A"/>
    <ellipse cx="55" cy="3" rx="30" ry="4" fill="#E8C94A"/>
    <!-- Livrinho no prato direito -->
    <rect x="46" y="-10" width="18" height="14" rx="1" fill="#2a4a6a"/>
    <line x1="48" y1="-7" x2="50" y2="-7" stroke="#D4A54A" stroke-width="1"/>
    <line x1="48" y1="-3" x2="62" y2="-3" stroke="#fff" stroke-width="0.5" opacity="0.7"/>
    <line x1="48" y1="0" x2="62" y2="0" stroke="#fff" stroke-width="0.5" opacity="0.7"/>
  </g>

  <!-- Conexão visual entre pilha e balança -->
  <g transform="translate(330,310)" opacity="0.5">
    <path d="M0 0 Q 30 0 50 0" stroke="#d4c8a8" stroke-width="2" fill="none" stroke-dasharray="3,3"/>
  </g>

  <!-- ============ 3 BADGES — CONCEITOS ============ -->
  <g transform="translate(40,530)">
    <!-- DIREITO -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="170" height="135" rx="14" fill="#fdebe7" stroke="#F5A08F" stroke-width="2"/>
      <rect x="0" y="0" width="170" height="6" rx="3" fill="#E87461"/>
      <!-- Ícone: estrela em escudo -->
      <g transform="translate(85,50)">
        <path d="M-22 -20 L 22 -20 L 22 8 Q 22 20 0 28 Q -22 20 -22 8 Z" fill="#E87461"/>
        <path d="M0 -14 L 4 -6 L 12 -5 L 6 1 L 8 9 L 0 5 L -8 9 L -6 1 L -12 -5 L -4 -6 Z" fill="#fff"/>
      </g>
      <text x="85" y="100" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#7a2a20">DIREITO</text>
      <text x="85" y="116" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#a04030">Constituicional</text>
    </g>

    <!-- POLÍTICA PÚBLICA -->
    <g transform="translate(175,0)">
      <rect x="0" y="0" width="170" height="135" rx="14" fill="#cce8f2" stroke="#5b9bd5" stroke-width="2"/>
      <rect x="0" y="0" width="170" height="6" rx="3" fill="#5b9bd5"/>
      <!-- Ícone: prédio público / instituição -->
      <g transform="translate(85,50)">
        <!-- Base -->
        <rect x="-26" y="8" width="52" height="6" fill="#2a4a6a"/>
        <!-- Colunas -->
        <rect x="-22" y="-10" width="6" height="18" fill="#5b9bd5"/>
        <rect x="-10" y="-10" width="6" height="18" fill="#5b9bd5"/>
        <rect x="4" y="-10" width="6" height="18" fill="#5b9bd5"/>
        <rect x="16" y="-10" width="6" height="18" fill="#5b9bd5"/>
        <!-- Telhado -->
        <path d="M-28 -10 L 28 -10 L 22 -20 L -22 -20 Z" fill="#2a4a6a"/>
        <!-- Topo -->
        <rect x="-30" y="-14" width="60" height="4" fill="#2a4a6a"/>
        <!-- Estrela no topo -->
        <path d="M0 -28 L 2 -22 L 8 -22 L 3 -18 L 5 -12 L 0 -16 L -5 -12 L -3 -18 L -8 -22 L -2 -22 Z" fill="#D4A54A"/>
      </g>
      <text x="85" y="100" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#2a4a6a">POLÍTICA</text>
      <text x="85" y="116" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#5b9bd5">Pública intersetorial</text>
    </g>

    <!-- GARANTIA -->
    <g transform="translate(350,0)">
      <rect x="0" y="0" width="170" height="135" rx="14" fill="#e8f5ed" stroke="#7CB98A" stroke-width="2"/>
      <rect x="0" y="0" width="170" height="6" rx="3" fill="#4A7C59"/>
      <!-- Ícone: aperto de mão / selo -->
      <g transform="translate(85,50)">
        <circle cx="0" cy="0" r="22" fill="#4A7C59"/>
        <circle cx="0" cy="0" r="18" fill="none" stroke="#fff" stroke-width="1.5"/>
        <path d="M-10 0 L -3 8 L 12 -8" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="85" y="100" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#2d5a3a">GARANTIA</text>
      <text x="85" y="116" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#4A7C59">Para cada criança</text>
    </g>
  </g>

  <!-- RODAPÉ -->
  <text x="300" y="700" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#3a3a3a" font-style="italic">"Alimentação escolar é direito, não favor."</text>
  <text x="300" y="725" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="2.5" fill="#7a6a4a">ARCABOUÇO JURÍDICO · PNAE · PAE-DF</text>
</svg>
