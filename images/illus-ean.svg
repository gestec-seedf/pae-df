<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750">
  <defs>
    <linearGradient id="bg-ean" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf6e8"/>
      <stop offset="1" stop-color="#f5f0e6"/>
    </linearGradient>
    <radialGradient id="luz-verde" cx="40%" cy="35%" r="60%">
      <stop offset="0" stop-color="#a8e6b8"/>
      <stop offset="0.7" stop-color="#4A7C59"/>
      <stop offset="1" stop-color="#2d5a3a"/>
    </radialGradient>
    <radialGradient id="luz-amarela" cx="40%" cy="35%" r="60%">
      <stop offset="0" stop-color="#fff0a0"/>
      <stop offset="0.7" stop-color="#E8C94A"/>
      <stop offset="1" stop-color="#8a6a20"/>
    </radialGradient>
    <radialGradient id="luz-vermelha" cx="40%" cy="35%" r="60%">
      <stop offset="0" stop-color="#ffb8a8"/>
      <stop offset="0.7" stop-color="#E87461"/>
      <stop offset="1" stop-color="#7a2a20"/>
    </radialGradient>
  </defs>

  <rect width="600" height="750" fill="url(#bg-ean)"/>

  <!-- TÍTULO -->
  <text x="300" y="50" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" letter-spacing="3.5" fill="#7a6a4a">EDUCAÇÃO ALIMENTAR E NUTRICIONAL</text>
  <text x="300" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="38" font-weight="700" fill="#3a3a3a">Semáforo dos <tspan font-style="italic" fill="#4A7C59">Alimentos</tspan></text>

  <!-- ============ FAIXA VERDE — PREFIRA ============ -->
  <g transform="translate(40,130)">
    <!-- Container -->
    <rect width="520" height="180" rx="18" fill="#e8f5ed" stroke="#7CB98A" stroke-width="2"/>
    <rect width="12" height="180" rx="3" fill="#4A7C59"/>

    <!-- LUZ verde -->
    <g transform="translate(85,90)">
      <circle r="55" fill="#2a2a2a"/>
      <circle r="48" fill="url(#luz-verde)"/>
      <circle cx="-14" cy="-16" r="13" fill="#fff" opacity="0.35"/>
      <path d="M-20 0 L -5 14 L 22 -16" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Título e subtítulo -->
    <text x="170" y="40" font-family="Inter,sans-serif" font-size="36" font-weight="700" fill="#2d5a3a">PREFIRA</text>
    <text x="170" y="62" font-family="Inter,sans-serif" font-size="18" font-weight="500" fill="#4A7C59">Frutas, legumes, verduras, cereais</text>
    <text x="170" y="78" font-family="Inter,sans-serif" font-size="18" font-weight="500" fill="#4A7C59">integrais, leguminosas e carnes magras</text>

    <!-- Alimentos -->
    <g transform="translate(180,130)">
      <!-- Maçã -->
      <g transform="translate(0,0)">
        <circle cx="0" cy="0" r="16" fill="#c83232"/>
        <circle cx="-4" cy="-4" r="6" fill="#e87461" opacity="0.55"/>
        <path d="M0 -15 Q 1 -20 6 -20" stroke="#5a3a23" stroke-width="2" fill="none"/>
        <ellipse cx="7" cy="-18" rx="4" ry="1.6" fill="#4A7C59" transform="rotate(25 7 -18)"/>
      </g>
      <!-- Banana -->
      <g transform="translate(50,0) rotate(15)">
        <path d="M-13 0 Q -13 -20 0 -28 Q 10 -25 15 -16 Q 10 5 -13 0 Z" fill="#D4A54A"/>
        <path d="M-10 -2 Q -10 -18 -1 -24 Q 7 -22 11 -13 Q 6 1 -10 -2 Z" fill="#E8C94A"/>
      </g>
      <!-- Cenoura -->
      <g transform="translate(100,0)">
        <path d="M0 -13 L 10 18 L -10 18 Z" fill="#f57c00"/>
        <path d="M-2 -13 Q -2 -20 -6 -22" stroke="#4A7C59" stroke-width="2.5" fill="none"/>
        <path d="M2 -13 Q 2 -21 6 -23" stroke="#4A7C59" stroke-width="2.5" fill="none"/>
        <path d="M0 -13 Q 0 -22 0 -24" stroke="#4A7C59" stroke-width="2.5" fill="none"/>
      </g>
      <!-- Brócolis -->
      <g transform="translate(150,3)">
        <rect x="-5" y="-2" width="10" height="17" rx="2" fill="#e8dec4"/>
        <circle cx="-9" cy="-6" r="8" fill="#4A7C59"/>
        <circle cx="0" cy="-11" r="9" fill="#5A9A6E"/>
        <circle cx="9" cy="-6" r="8" fill="#4A7C59"/>
        <circle cx="-4" cy="-15" r="5" fill="#5A9A6E"/>
        <circle cx="5" cy="-15" r="5" fill="#5A9A6E"/>
      </g>
      <!-- Tomate -->
      <g transform="translate(200,2)">
        <circle cx="0" cy="2" r="14" fill="#E87461"/>
        <circle cx="-4" cy="-2" r="4" fill="#fff" opacity="0.4"/>
        <path d="M-6 -10 L 0 -13 L 6 -10" stroke="#4A7C59" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </g>
      <!-- Feijão (tigela) -->
      <g transform="translate(250,3)">
        <path d="M-17 -2 Q -17 10 0 13 Q 17 10 17 -2 Z" fill="#5a3a23"/>
        <ellipse cx="0" cy="-2" rx="17" ry="4" fill="#3a1f10"/>
        <circle cx="-5" cy="-2" r="2.5" fill="#2a1408"/>
        <circle cx="4" cy="-4" r="2.5" fill="#2a1408"/>
        <circle cx="0" cy="0" r="2.5" fill="#2a1408"/>
      </g>
      <!-- Peixe -->
      <g transform="translate(300,2)">
        <ellipse cx="-3" cy="0" rx="17" ry="10" fill="#7ccae0"/>
        <path d="M13 0 L 22 -8 L 22 8 Z" fill="#7ccae0"/>
        <circle cx="-10" cy="-2" r="2" fill="#3a3a3a"/>
        <line x1="-7" y1="-3" x2="-7" y2="3" stroke="#5b9bd5" stroke-width="1"/>
        <line x1="-2" y1="-4" x2="-2" y2="4" stroke="#5b9bd5" stroke-width="1"/>
        <line x1="3" y1="-4" x2="3" y2="4" stroke="#5b9bd5" stroke-width="1"/>
      </g>
    </g>
  </g>

  <!-- ============ FAIXA AMARELA — LIMITE ============ -->
  <g transform="translate(40,330)">
    <rect width="520" height="180" rx="18" fill="#fdf6e0" stroke="#E8C94A" stroke-width="2"/>
    <rect width="12" height="180" rx="3" fill="#D4A54A"/>

    <!-- LUZ amarela -->
    <g transform="translate(85,90)">
      <circle r="55" fill="#2a2a2a"/>
      <circle r="48" fill="url(#luz-amarela)"/>
      <circle cx="-14" cy="-16" r="13" fill="#fff" opacity="0.35"/>
      <rect x="-7" y="-25" width="14" height="32" rx="3" fill="#fff"/>
      <circle cx="0" cy="18" r="7" fill="#fff"/>
    </g>

    <!-- Título e subtítulo -->
    <text x="170" y="40" font-family="Inter,sans-serif" font-size="36" font-weight="700" fill="#8a6a20">LIMITE</text>
    <text x="170" y="62" font-family="Inter,sans-serif" font-size="18" font-weight="500" fill="#a78930">Ingredientes culinários e processados</text>
    <text x="170" y="78" font-family="Inter,sans-serif" font-size="18" font-weight="500" fill="#a78930">— usar com moderação</text>

    <!-- Alimentos -->
    <g transform="translate(180,130)">
      <!-- Açúcar -->
      <g transform="translate(0,0)">
        <rect x="-15" y="-12" width="30" height="22" rx="3" fill="#fff" stroke="#aaa" stroke-width="1.2"/>
        <text x="0" y="4" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#8a6a20">AÇÚCAR</text>
      </g>
      <!-- Sal (saleiro) -->
      <g transform="translate(50,0)">
        <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#aaa"/>
        <rect x="-10" y="-15" width="20" height="5" rx="1.5" fill="#888"/>
        <circle cx="-3" cy="-13" r="1.2" fill="#fff"/>
        <circle cx="3" cy="-13" r="1.2" fill="#fff"/>
        <circle cx="0" cy="-14" r="1.2" fill="#fff"/>
        <text x="0" y="4" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#fff">SAL</text>
      </g>
      <!-- Óleo (garrafinha) -->
      <g transform="translate(100,0)">
        <path d="M-10 -15 L 10 -15 L 12 14 L -12 14 Z" fill="#E8C94A"/>
        <rect x="-7" y="-18" width="14" height="4" rx="1.5" fill="#a87545"/>
        <ellipse cx="0" cy="-2" rx="8" ry="3" fill="#D4A54A" opacity="0.5"/>
      </g>
      <!-- Queijo -->
      <g transform="translate(150,0)">
        <path d="M-16 8 L 16 8 L 12 -12 L -12 -12 Z" fill="#fff0a0"/>
        <path d="M-16 8 L -12 -12 L -12 8 Z" fill="#E8C94A" opacity="0.5"/>
        <circle cx="-4" cy="0" r="2.5" fill="#fff" stroke="#D4A54A" stroke-width="0.8"/>
        <circle cx="5" cy="3" r="2" fill="#fff" stroke="#D4A54A" stroke-width="0.8"/>
        <circle cx="0" cy="-4" r="1.6" fill="#fff" stroke="#D4A54A" stroke-width="0.8"/>
      </g>
      <!-- Manteiga -->
      <g transform="translate(200,0)">
        <path d="M-14 -10 L 14 -10 L 12 10 L -12 10 Z" fill="#fdf6c0"/>
        <path d="M-14 -10 L 14 -10 L 10 -5 L -10 -5 Z" fill="#fff8e0"/>
      </g>
      <!-- Pão branco -->
      <g transform="translate(250,0)">
        <ellipse cx="0" cy="0" rx="16" ry="11" fill="#fdf6c0"/>
        <ellipse cx="0" cy="-3" rx="13" ry="7" fill="#fff8e0"/>
      </g>
      <!-- Conserva (vidro) -->
      <g transform="translate(300,0)">
        <rect x="-11" y="-15" width="22" height="27" rx="2.5" fill="#7ccae0" opacity="0.5"/>
        <rect x="-12" y="-19" width="24" height="5" rx="1.5" fill="#aaa"/>
        <circle cx="-4" cy="-6" r="2.5" fill="#4A7C59"/>
        <circle cx="4" cy="0" r="2.5" fill="#E87461"/>
        <circle cx="-3" cy="6" r="2.5" fill="#4A7C59"/>
      </g>
    </g>
  </g>

  <!-- ============ FAIXA VERMELHA — EVITE ============ -->
  <g transform="translate(40,530)">
    <rect width="520" height="180" rx="18" fill="#fdebe7" stroke="#F5A08F" stroke-width="2"/>
    <rect width="12" height="180" rx="3" fill="#E87461"/>

    <!-- LUZ vermelha -->
    <g transform="translate(85,90)">
      <circle r="55" fill="#2a2a2a"/>
      <circle r="48" fill="url(#luz-vermelha)"/>
      <circle cx="-14" cy="-16" r="13" fill="#fff" opacity="0.35"/>
      <line x1="-22" y1="-22" x2="22" y2="22" stroke="white" stroke-width="8" stroke-linecap="round"/>
      <line x1="22" y1="-22" x2="-22" y2="22" stroke="white" stroke-width="8" stroke-linecap="round"/>
    </g>

    <!-- Título e subtítulo -->
    <text x="170" y="40" font-family="Inter,sans-serif" font-size="36" font-weight="700" fill="#7a2a20">EVITE</text>
    <text x="170" y="62" font-family="Inter,sans-serif" font-size="18" font-weight="500" fill="#a04030">Ultraprocessados — refrigerantes,</text>
    <text x="170" y="78" font-family="Inter,sans-serif" font-size="18" font-weight="500" fill="#a04030">doces e salgadinhos industriais</text>

    <!-- Alimentos -->
    <g transform="translate(180,130)">
      <!-- Refrigerante -->
      <g transform="translate(0,0)">
        <rect x="-9" y="-18" width="18" height="28" rx="2.5" fill="#c83232"/>
        <rect x="-10" y="-20" width="20" height="5" rx="1.5" fill="#888"/>
        <rect x="-9" y="-13" width="18" height="4" fill="#fff" opacity="0.4"/>
        <line x1="-15" y1="6" x2="15" y2="6" stroke="#fff" stroke-width="2.5"/>
      </g>
      <!-- Salgadinho (pacote) -->
      <g transform="translate(50,0)">
        <path d="M-13 -15 L 13 -15 L 15 13 L -15 13 Z" fill="#E87461"/>
        <path d="M-11 -18 L 11 -18 L 13 -13 L -13 -13 Z" fill="#c83232"/>
        <path d="M11 18 L -11 18 L -13 13 L 13 13 Z" fill="#c83232"/>
        <line x1="-17" y1="0" x2="17" y2="0" stroke="#fff" stroke-width="3"/>
      </g>
      <!-- Biscoito recheado -->
      <g transform="translate(100,0)">
        <circle cx="0" cy="0" r="14" fill="#5a3a23"/>
        <circle cx="0" cy="0" r="12" fill="#3a1f10"/>
        <rect x="-12" y="-2" width="24" height="4" fill="#fefdf6"/>
        <circle cx="-6" cy="-6" r="1" fill="#fefdf6"/>
        <circle cx="6" cy="6" r="1" fill="#fefdf6"/>
        <line x1="-13" y1="8" x2="13" y2="8" stroke="#fff" stroke-width="3"/>
      </g>
      <!-- Chocolate (barra) -->
      <g transform="translate(150,0)">
        <rect x="-14" y="-11" width="28" height="22" rx="2.5" fill="#5a3a23"/>
        <rect x="-12" y="-9" width="7" height="7" rx="1.2" fill="#3a1f10"/>
        <rect x="-3" y="-9" width="7" height="7" rx="1.2" fill="#3a1f10"/>
        <rect x="6" y="-9" width="7" height="7" rx="1.2" fill="#3a1f10"/>
        <rect x="-12" y="2" width="7" height="7" rx="1.2" fill="#3a1f10"/>
        <rect x="-3" y="2" width="7" height="7" rx="1.2" fill="#3a1f10"/>
        <rect x="6" y="2" width="7" height="7" rx="1.2" fill="#3a1f10"/>
        <line x1="-16" y1="0" x2="16" y2="0" stroke="#fff" stroke-width="3"/>
      </g>
      <!-- Hambúrguer -->
      <g transform="translate(200,0)">
        <ellipse cx="0" cy="-9" rx="16" ry="7" fill="#D4A54A"/>
        <rect x="-16" y="-4" width="32" height="4" fill="#4A7C59"/>
        <rect x="-16" y="0" width="32" height="4" fill="#6e4828"/>
        <ellipse cx="0" cy="9" rx="16" ry="6" fill="#D4A54A"/>
        <line x1="-18" y1="0" x2="18" y2="0" stroke="#fff" stroke-width="3"/>
      </g>
      <!-- Sorvete -->
      <g transform="translate(250,0)">
        <path d="M-11 -3 L 11 -3 L 0 17 Z" fill="#E8C94A"/>
        <circle cx="0" cy="-6" r="11" fill="#E87461"/>
        <circle cx="-5" cy="-11" r="6" fill="#fdf0ee"/>
        <line x1="-15" y1="2" x2="15" y2="2" stroke="#fff" stroke-width="3"/>
      </g>
      <!-- Embutido -->
      <g transform="translate(300,0)">
        <rect x="-15" y="-6" width="30" height="12" rx="6" fill="#E87461"/>
        <rect x="-13" y="-3" width="26" height="3" rx="1" fill="#fdf0ee" opacity="0.3"/>
        <line x1="-17" y1="0" x2="17" y2="0" stroke="#fff" stroke-width="3"/>
      </g>
    </g>
  </g>

  <!-- Rodapé -->
  <text x="300" y="730" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="600" letter-spacing="2.5" fill="#7a6a4a">Classificação NOVA · Guia Alimentar para a População Brasileira</text>
</svg>
