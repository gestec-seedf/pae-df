<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750">
  <defs>
    <linearGradient id="bg-ativ" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf6e8"/>
      <stop offset="1" stop-color="#f5f0e6"/>
    </linearGradient>
  </defs>

  <rect width="600" height="750" fill="url(#bg-ativ)"/>

  <!-- HEADER -->
  <text x="300" y="50" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" letter-spacing="3.5" fill="#7a6a4a">PRÁTICAS PEDAGÓGICAS · EDUCAÇÃO INFANTIL</text>
  <text x="300" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="28" font-weight="700" fill="#3a3a3a">Atividades por <tspan font-style="italic" fill="#E87461">faixa etária</tspan></text>

  <!-- Timeline vertical (linha conectora) -->
  <line x1="100" y1="170" x2="100" y2="640" stroke="#d4c8a8" stroke-width="3" stroke-dasharray="5,5"/>

  <!-- ============ FAIXA 1 — BEBÊS ============ -->
  <g transform="translate(40,140)">
    <!-- Card -->
    <rect x="40" y="0" width="500" height="170" rx="18" fill="#fdf0ee" stroke="#F5A08F" stroke-width="2"/>
    <rect x="40" y="0" width="12" height="170" rx="3" fill="#E87461"/>

    <!-- Bolinha cronológica na timeline -->
    <circle cx="60" cy="40" r="28" fill="#E87461"/>
    <circle cx="60" cy="40" r="22" fill="#fdf0ee"/>
    <text x="60" y="35" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#E87461" letter-spacing="0.5">FASE</text>
    <text x="60" y="50" text-anchor="middle" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="#7a2a20">01</text>

    <!-- Texto -->
    <text x="105" y="32" font-family="Inter,sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#a04030">BEBÊS · 0 A 1A 6M</text>
    <text x="105" y="58" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="#7a2a20">Sensorial e afetivo</text>
    <text x="105" y="80" font-family="Inter,sans-serif" font-size="11" fill="#a04030">Bandeja sensorial · canção dos alimentos · fantoches</text>

    <!-- Cena: cadeirinha + bandeja com frutas -->
    <g transform="translate(280,130)">
      <!-- Cadeirinha (silhueta) -->
      <rect x="-25" y="-15" width="50" height="30" rx="6" fill="#D4A54A"/>
      <rect x="-30" y="-5" width="60" height="6" rx="2" fill="#a87545"/>
      <line x1="-22" y1="15" x2="-25" y2="32" stroke="#8B5E3C" stroke-width="3"/>
      <line x1="22" y1="15" x2="25" y2="32" stroke="#8B5E3C" stroke-width="3"/>
      <!-- Bebê (cabecinha) -->
      <circle cx="0" cy="-22" r="14" fill="#f5d4b0"/>
      <ellipse cx="-4" cy="-22" rx="1.2" ry="1.5" fill="#3a3a3a"/>
      <ellipse cx="4" cy="-22" rx="1.2" ry="1.5" fill="#3a3a3a"/>
      <path d="M-3 -16 Q 0 -14 3 -16" stroke="#3a3a3a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <!-- Cabelinho -->
      <path d="M-12 -28 Q 0 -36 12 -28" stroke="#5a3a23" stroke-width="3" fill="none"/>
    </g>

    <!-- Bandeja sensorial com alimentos -->
    <g transform="translate(150,135)">
      <!-- Bandeja -->
      <ellipse cx="0" cy="0" rx="55" ry="14" fill="#a87545"/>
      <ellipse cx="0" cy="-2" rx="52" ry="11" fill="#c8905d"/>
      <!-- Banana -->
      <g transform="translate(-35,-4)">
        <ellipse cx="0" cy="0" rx="11" ry="5" fill="#D4A54A"/>
        <ellipse cx="0" cy="-1" rx="9" ry="3" fill="#E8C94A"/>
      </g>
      <!-- Abacate (metade) -->
      <g transform="translate(-12,-4)">
        <ellipse cx="0" cy="0" rx="10" ry="6" fill="#4A7C59"/>
        <ellipse cx="0" cy="0" rx="8" ry="4.5" fill="#a8c878"/>
        <circle cx="0" cy="0" r="2.5" fill="#5a3a23"/>
      </g>
      <!-- Cenoura -->
      <g transform="translate(12,-3)">
        <path d="M-3 -5 L 3 -5 L 5 4 L -5 4 Z" fill="#f57c00"/>
        <line x1="-1" y1="-5" x2="-2" y2="-8" stroke="#4A7C59" stroke-width="1.2"/>
        <line x1="1" y1="-5" x2="2" y2="-8" stroke="#4A7C59" stroke-width="1.2"/>
      </g>
      <!-- Mamão (cubinhos) -->
      <g transform="translate(35,-3)">
        <rect x="-5" y="-4" width="5" height="5" rx="1" fill="#f57c00"/>
        <rect x="1" y="-4" width="5" height="5" rx="1" fill="#FFA040"/>
        <rect x="-2" y="2" width="5" height="4" rx="1" fill="#f57c00"/>
      </g>
    </g>

    <!-- Notinhas musicais (canção dos alimentos) -->
    <g transform="translate(450,40)" fill="#E87461" opacity="0.7">
      <text x="0" y="0" font-family="serif" font-size="22">♪</text>
      <text x="15" y="-8" font-family="serif" font-size="18">♫</text>
      <text x="-12" y="-5" font-family="serif" font-size="16">♪</text>
    </g>
  </g>

  <!-- ============ FAIXA 2 — CRECHE ============ -->
  <g transform="translate(40,335)">
    <rect x="40" y="0" width="500" height="170" rx="18" fill="#e8f5ed" stroke="#7CB98A" stroke-width="2"/>
    <rect x="40" y="0" width="12" height="170" rx="3" fill="#4A7C59"/>

    <circle cx="60" cy="40" r="28" fill="#4A7C59"/>
    <circle cx="60" cy="40" r="22" fill="#e8f5ed"/>
    <text x="60" y="35" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#4A7C59" letter-spacing="0.5">FASE</text>
    <text x="60" y="50" text-anchor="middle" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="#2d5a3a">02</text>

    <text x="105" y="32" font-family="Inter,sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#4A7C59">CRECHE · 1A 7M A 3A 11M</text>
    <text x="105" y="58" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="#2d5a3a">Autonomia e brincar</text>
    <text x="105" y="80" font-family="Inter,sans-serif" font-size="11" fill="#4A7C59">Mercadinho lúdico · feijão mágico · jogo da memória</text>

    <!-- Cena: criança no mercadinho com cestinha -->
    <g transform="translate(170,135)">
      <!-- Criança -->
      <ellipse cx="0" cy="-30" r="14" fill="#f5d4b0"/>
      <circle cx="0" cy="-30" r="14" fill="#f5d4b0"/>
      <ellipse cx="-4" cy="-30" rx="1.2" ry="1.5" fill="#3a3a3a"/>
      <ellipse cx="4" cy="-30" rx="1.2" ry="1.5" fill="#3a3a3a"/>
      <path d="M-3 -25 Q 0 -22 3 -25" stroke="#3a3a3a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <!-- Cabelo -->
      <path d="M-14 -38 Q 0 -50 14 -38 L 12 -32 Q 0 -42 -12 -32 Z" fill="#5a3a23"/>
      <!-- Corpo -->
      <path d="M-12 -15 L 12 -15 L 15 18 L -15 18 Z" fill="#5b9bd5"/>
      <!-- Braço com cestinha -->
      <path d="M-12 -8 Q -22 0 -22 18" stroke="#f5d4b0" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Cestinha com frutas/legumes -->
    <g transform="translate(135,160)">
      <!-- Alça -->
      <path d="M-14 -8 Q 0 -18 14 -8" stroke="#8B5E3C" stroke-width="2.5" fill="none"/>
      <!-- Cesta -->
      <path d="M-18 -8 L 18 -8 L 14 12 L -14 12 Z" fill="#a87545"/>
      <path d="M-18 -8 L 18 -8 L 16 -5 L -16 -5 Z" fill="#c8905d"/>
      <!-- Frutas dentro -->
      <circle cx="-8" cy="-3" r="5" fill="#c83232"/>
      <circle cx="2" cy="-5" r="5" fill="#D4A54A"/>
      <circle cx="10" cy="-3" r="5" fill="#4A7C59"/>
      <!-- Folha sobrando -->
      <ellipse cx="3" cy="-9" rx="3" ry="1.5" fill="#3D6849"/>
    </g>

    <!-- Plantinha de feijão -->
    <g transform="translate(370,135)">
      <!-- Vaso/copo -->
      <path d="M-15 0 L 15 0 L 12 25 L -12 25 Z" fill="#aaddee" opacity="0.6"/>
      <ellipse cx="0" cy="0" rx="15" ry="3" fill="#7ccae0" opacity="0.7"/>
      <!-- Terra -->
      <ellipse cx="0" cy="2" rx="12" ry="2.5" fill="#5a3a23"/>
      <!-- Caule -->
      <path d="M0 0 Q 2 -15 -3 -28" stroke="#4A7C59" stroke-width="2.5" fill="none"/>
      <!-- Folhas -->
      <ellipse cx="-6" cy="-15" rx="6" ry="3" fill="#4A7C59" transform="rotate(-30 -6 -15)"/>
      <ellipse cx="4" cy="-22" rx="7" ry="4" fill="#5A9A6E" transform="rotate(20 4 -22)"/>
      <ellipse cx="-4" cy="-30" rx="6" ry="3" fill="#4A7C59" transform="rotate(-15 -4 -30)"/>
      <!-- Grão de feijão -->
      <ellipse cx="0" cy="-3" rx="3" ry="2" fill="#3a1f10"/>
    </g>

    <!-- Cartas do jogo da memória -->
    <g transform="translate(450,140)">
      <rect x="-8" y="-15" width="14" height="20" rx="2" fill="#fff" stroke="#4A7C59" stroke-width="1.5" transform="rotate(-10 -1 -5)"/>
      <rect x="-4" y="-12" width="14" height="20" rx="2" fill="#fff" stroke="#4A7C59" stroke-width="1.5" transform="rotate(5 3 -2)"/>
      <circle cx="3" cy="-3" r="3" fill="#E87461"/>
      <circle cx="3" cy="-3" r="1.5" fill="#4A7C59"/>
    </g>
  </g>

  <!-- ============ FAIXA 3 — PRÉ-ESCOLA ============ -->
  <g transform="translate(40,530)">
    <rect x="40" y="0" width="500" height="170" rx="18" fill="#fdf6e0" stroke="#E8C94A" stroke-width="2"/>
    <rect x="40" y="0" width="12" height="170" rx="3" fill="#D4A54A"/>

    <circle cx="60" cy="40" r="28" fill="#D4A54A"/>
    <circle cx="60" cy="40" r="22" fill="#fdf6e0"/>
    <text x="60" y="35" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#D4A54A" letter-spacing="0.5">FASE</text>
    <text x="60" y="50" text-anchor="middle" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="#8a6a20">03</text>

    <text x="105" y="32" font-family="Inter,sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#a78930">PRÉ-ESCOLA · 4 A 5A 11M</text>
    <text x="105" y="58" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="#8a6a20">Investigação e horta</text>
    <text x="105" y="80" font-family="Inter,sans-serif" font-size="11" fill="#a78930">Horta escolar · investigação · cozinha experimental</text>

    <!-- Cena: criança com regador na horta -->
    <g transform="translate(180,135)">
      <!-- Criança -->
      <circle cx="0" cy="-28" r="14" fill="#f5d4b0"/>
      <ellipse cx="-4" cy="-28" rx="1.2" ry="1.5" fill="#3a3a3a"/>
      <ellipse cx="4" cy="-28" rx="1.2" ry="1.5" fill="#3a3a3a"/>
      <path d="M-3 -23 Q 0 -20 3 -23" stroke="#3a3a3a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <!-- Chapéu -->
      <ellipse cx="0" cy="-38" rx="18" ry="3" fill="#D4A54A"/>
      <path d="M-10 -38 Q -8 -48 0 -50 Q 8 -48 10 -38 Z" fill="#E8C94A"/>
      <!-- Corpo -->
      <path d="M-12 -14 L 12 -14 L 15 18 L -15 18 Z" fill="#7CB98A"/>
      <!-- Braço esticado segurando regador -->
      <path d="M12 -8 Q 22 -2 28 4" stroke="#f5d4b0" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Regador -->
    <g transform="translate(235,140)">
      <rect x="-12" y="-10" width="22" height="18" rx="3" fill="#5b9bd5"/>
      <path d="M-12 -5 L -20 -10 L -22 -8 L -14 -3 Z" fill="#5b9bd5"/>
      <rect x="-14" y="-12" width="8" height="3" rx="1" fill="#5b9bd5"/>
      <!-- Gotinhas -->
      <ellipse cx="-22" cy="-5" rx="0.8" ry="2" fill="#7ccae0"/>
      <ellipse cx="-24" cy="-2" rx="0.8" ry="2" fill="#7ccae0"/>
    </g>

    <!-- Canteiro com plantas -->
    <g transform="translate(360,150)">
      <!-- Solo -->
      <ellipse cx="0" cy="10" rx="60" ry="8" fill="#5a3a23"/>
      <ellipse cx="0" cy="9" rx="58" ry="6" fill="#8B5E3C"/>
      <!-- Plantas -->
      <g transform="translate(-40,0)">
        <line x1="0" y1="0" x2="0" y2="9" stroke="#4A7C59" stroke-width="2"/>
        <ellipse cx="-5" cy="-3" rx="6" ry="3" fill="#4A7C59" transform="rotate(-30 -5 -3)"/>
        <ellipse cx="5" cy="-5" rx="6" ry="3" fill="#5A9A6E" transform="rotate(30 5 -5)"/>
        <circle cx="0" cy="-8" r="4" fill="#E87461"/>
      </g>
      <g transform="translate(-15,0)">
        <line x1="0" y1="-5" x2="0" y2="9" stroke="#4A7C59" stroke-width="2"/>
        <ellipse cx="-4" cy="-8" rx="5" ry="2.5" fill="#4A7C59" transform="rotate(-20 -4 -8)"/>
        <ellipse cx="4" cy="-10" rx="5" ry="2.5" fill="#5A9A6E" transform="rotate(20 4 -10)"/>
        <circle cx="0" cy="-13" r="3" fill="#D4A54A"/>
      </g>
      <g transform="translate(15,0)">
        <line x1="0" y1="-3" x2="0" y2="9" stroke="#4A7C59" stroke-width="2"/>
        <path d="M-6 -5 L 0 -12 L 6 -5" stroke="#4A7C59" stroke-width="2" fill="#5A9A6E"/>
        <path d="M-4 -10 L 0 -14 L 4 -10" stroke="#4A7C59" stroke-width="1.5" fill="#4A7C59"/>
      </g>
      <g transform="translate(40,0)">
        <line x1="0" y1="-5" x2="0" y2="9" stroke="#4A7C59" stroke-width="2"/>
        <ellipse cx="-5" cy="-7" rx="6" ry="3" fill="#5A9A6E" transform="rotate(-25 -5 -7)"/>
        <ellipse cx="5" cy="-9" rx="6" ry="3" fill="#4A7C59" transform="rotate(25 5 -9)"/>
        <circle cx="0" cy="-13" r="3.5" fill="#f57c00"/>
      </g>
    </g>

    <!-- Sol -->
    <g transform="translate(470,30)">
      <circle cx="0" cy="0" r="12" fill="#E8C94A"/>
      <g stroke="#D4A54A" stroke-width="2" stroke-linecap="round">
        <line x1="-18" y1="0" x2="-15" y2="0"/>
        <line x1="15" y1="0" x2="18" y2="0"/>
        <line x1="0" y1="-18" x2="0" y2="-15"/>
        <line x1="0" y1="15" x2="0" y2="18"/>
        <line x1="-12" y1="-12" x2="-10" y2="-10"/>
        <line x1="12" y1="-12" x2="10" y2="-10"/>
        <line x1="-12" y1="12" x2="-10" y2="10"/>
        <line x1="12" y1="12" x2="10" y2="10"/>
      </g>
    </g>
  </g>

  <!-- RODAPÉ -->
  <text x="300" y="725" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="2.5" fill="#7a6a4a">DO BERÇO À PRÉ-ESCOLA · COM INTENCIONALIDADE</text>
</svg>
