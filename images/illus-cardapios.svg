<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750">
  <defs>
    <linearGradient id="bg-card" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf6e8"/>
      <stop offset="1" stop-color="#f5f0e6"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fefdf6"/>
      <stop offset="1" stop-color="#f8f1de"/>
    </linearGradient>
  </defs>

  <rect width="600" height="750" fill="url(#bg-card)"/>

  <!-- HEADER -->
  <text x="300" y="50" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" letter-spacing="3.5" fill="#7a6a4a">EDUCAÇÃO INFANTIL · PNAE</text>
  <text x="300" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="30" font-weight="700" fill="#3a3a3a">Cardápio da <tspan font-style="italic" fill="#4A7C59">Semana</tspan></text>

  <!-- CLIPBOARD/PAPEL -->
  <rect x="30" y="115" width="540" height="565" rx="14" fill="#a87545"/>
  <rect x="40" y="125" width="520" height="545" rx="10" fill="url(#paper)" stroke="#d4c8a8" stroke-width="1.5"/>
  <!-- Clipboard topo -->
  <rect x="240" y="103" width="120" height="22" rx="4" fill="#8b6238"/>
  <rect x="265" y="98" width="70" height="14" rx="3" fill="#6e4828"/>
  <circle cx="300" cy="105" r="3" fill="#3a1f10"/>

  <!-- ============ SEGUNDA-FEIRA ============ -->
  <g transform="translate(60,150)">
    <!-- Tag do dia -->
    <rect x="0" y="0" width="60" height="42" rx="8" fill="#4A7C59"/>
    <text x="30" y="16" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#a8e6b8" letter-spacing="1">SEG</text>
    <text x="30" y="32" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#fff">02</text>
    <!-- Texto do prato -->
    <text x="75" y="14" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#3a3a3a">Arroz, feijão e carne moída</text>
    <text x="75" y="30" font-family="Inter,sans-serif" font-size="10" fill="#7a6a4a">Salada de alface e tomate · banana</text>
    <!-- Linha separadora -->
    <line x1="0" y1="55" x2="480" y2="55" stroke="#e8d8a8" stroke-width="0.8" stroke-dasharray="3,3"/>
    <!-- Alimentos -->
    <g transform="translate(295,20)">
      <!-- Arroz -->
      <g transform="translate(0,0)">
        <ellipse cx="0" cy="0" rx="12" ry="8" fill="#fdf6e8" stroke="#d4c8a8" stroke-width="0.8"/>
        <ellipse cx="-3" cy="-2" rx="1.5" ry="0.8" fill="#c8b888"/>
        <ellipse cx="3" cy="0" rx="1.5" ry="0.8" fill="#c8b888"/>
        <ellipse cx="0" cy="2" rx="1.5" ry="0.8" fill="#c8b888"/>
      </g>
      <!-- Feijão -->
      <g transform="translate(35,0)">
        <ellipse cx="0" cy="0" rx="12" ry="7" fill="#5a3a23"/>
        <ellipse cx="-3" cy="-1" rx="1.8" ry="1.3" fill="#2a1408"/>
        <ellipse cx="3" cy="0" rx="1.8" ry="1.3" fill="#2a1408"/>
      </g>
      <!-- Carne -->
      <g transform="translate(70,0)">
        <ellipse cx="0" cy="0" rx="11" ry="7" fill="#8B5E3C"/>
        <ellipse cx="-2" cy="-1" rx="2" ry="1.2" fill="#6e4828"/>
        <ellipse cx="3" cy="1" rx="2" ry="1.2" fill="#6e4828"/>
      </g>
      <!-- Salada -->
      <g transform="translate(105,0)">
        <ellipse cx="0" cy="0" rx="10" ry="6" fill="#4A7C59"/>
        <circle cx="3" cy="-1" r="2" fill="#E87461"/>
      </g>
      <!-- Banana -->
      <g transform="translate(140,0) rotate(15)">
        <path d="M-9 0 Q -9 -12 0 -16 Q 6 -14 9 -8 Q 6 3 -9 0 Z" fill="#D4A54A"/>
      </g>
    </g>
  </g>

  <!-- ============ TERÇA-FEIRA ============ -->
  <g transform="translate(60,250)">
    <rect x="0" y="0" width="60" height="42" rx="8" fill="#D4A54A"/>
    <text x="30" y="16" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#fff8c0" letter-spacing="1">TER</text>
    <text x="30" y="32" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#fff">03</text>
    <text x="75" y="14" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#3a3a3a">Macarrão com frango e legumes</text>
    <text x="75" y="30" font-family="Inter,sans-serif" font-size="10" fill="#7a6a4a">Cenoura e abobrinha · maçã</text>
    <line x1="0" y1="55" x2="480" y2="55" stroke="#e8d8a8" stroke-width="0.8" stroke-dasharray="3,3"/>
    <g transform="translate(295,20)">
      <!-- Macarrão -->
      <g transform="translate(0,0)">
        <ellipse cx="0" cy="0" rx="12" ry="8" fill="#fdf6c0"/>
        <path d="M-8 -2 Q 0 -5 8 -2" stroke="#E8C94A" stroke-width="1.5" fill="none"/>
        <path d="M-8 1 Q 0 4 8 1" stroke="#E8C94A" stroke-width="1.5" fill="none"/>
      </g>
      <!-- Frango -->
      <g transform="translate(35,0)">
        <ellipse cx="0" cy="0" rx="11" ry="7" fill="#D4A54A"/>
        <ellipse cx="0" cy="-2" rx="9" ry="4" fill="#E8C94A"/>
      </g>
      <!-- Cenoura -->
      <g transform="translate(70,0)">
        <path d="M-5 -8 L 5 -8 L 7 8 L -7 8 Z" fill="#f57c00"/>
        <path d="M-3 -8 Q -3 -11 -5 -12" stroke="#4A7C59" stroke-width="1.2" fill="none"/>
        <path d="M3 -8 Q 3 -11 5 -12" stroke="#4A7C59" stroke-width="1.2" fill="none"/>
      </g>
      <!-- Abobrinha -->
      <g transform="translate(105,0)">
        <ellipse cx="0" cy="0" rx="11" ry="6" fill="#5A9A6E"/>
        <ellipse cx="0" cy="-1" rx="9" ry="3" fill="#7CB98A"/>
      </g>
      <!-- Maçã -->
      <g transform="translate(140,0)">
        <circle cx="0" cy="0" r="9" fill="#c83232"/>
        <circle cx="-2" cy="-2" r="3" fill="#e87461" opacity="0.55"/>
        <ellipse cx="4" cy="-9" rx="3" ry="1.2" fill="#4A7C59" transform="rotate(25 4 -9)"/>
      </g>
    </g>
  </g>

  <!-- ============ QUARTA-FEIRA ============ -->
  <g transform="translate(60,350)">
    <rect x="0" y="0" width="60" height="42" rx="8" fill="#4A7C59"/>
    <text x="30" y="16" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#a8e6b8" letter-spacing="1">QUA</text>
    <text x="30" y="32" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#fff">04</text>
    <text x="75" y="14" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#3a3a3a">Arroz, feijão e peixe assado</text>
    <text x="75" y="30" font-family="Inter,sans-serif" font-size="10" fill="#7a6a4a">Brócolis e cenoura · laranja</text>
    <line x1="0" y1="55" x2="480" y2="55" stroke="#e8d8a8" stroke-width="0.8" stroke-dasharray="3,3"/>
    <g transform="translate(295,20)">
      <!-- Arroz -->
      <g transform="translate(0,0)">
        <ellipse cx="0" cy="0" rx="12" ry="8" fill="#fdf6e8" stroke="#d4c8a8" stroke-width="0.8"/>
        <ellipse cx="-3" cy="-2" rx="1.5" ry="0.8" fill="#c8b888"/>
        <ellipse cx="3" cy="0" rx="1.5" ry="0.8" fill="#c8b888"/>
      </g>
      <!-- Feijão -->
      <g transform="translate(35,0)">
        <ellipse cx="0" cy="0" rx="12" ry="7" fill="#5a3a23"/>
        <ellipse cx="-3" cy="-1" rx="1.8" ry="1.3" fill="#2a1408"/>
        <ellipse cx="3" cy="0" rx="1.8" ry="1.3" fill="#2a1408"/>
      </g>
      <!-- Peixe -->
      <g transform="translate(70,0)">
        <ellipse cx="-2" cy="0" rx="9" ry="6" fill="#7ccae0"/>
        <path d="M7 0 L 13 -4 L 13 4 Z" fill="#7ccae0"/>
        <circle cx="-5" cy="-1" r="1.2" fill="#3a3a3a"/>
      </g>
      <!-- Brócolis -->
      <g transform="translate(105,0)">
        <rect x="-2" y="0" width="4" height="6" rx="1" fill="#e8dec4"/>
        <circle cx="-5" cy="-3" r="4" fill="#4A7C59"/>
        <circle cx="0" cy="-6" r="5" fill="#5A9A6E"/>
        <circle cx="5" cy="-3" r="4" fill="#4A7C59"/>
      </g>
      <!-- Laranja -->
      <g transform="translate(140,0)">
        <circle cx="0" cy="0" r="9" fill="#f57c00"/>
        <circle cx="-2" cy="-2" r="3" fill="#FFA040" opacity="0.55"/>
      </g>
    </g>
  </g>

  <!-- ============ QUINTA-FEIRA ============ -->
  <g transform="translate(60,450)">
    <rect x="0" y="0" width="60" height="42" rx="8" fill="#E87461"/>
    <text x="30" y="16" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#fdebe7" letter-spacing="1">QUI</text>
    <text x="30" y="32" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#fff">05</text>
    <text x="75" y="14" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#3a3a3a">Lentilha, arroz e ovo cozido</text>
    <text x="75" y="30" font-family="Inter,sans-serif" font-size="10" fill="#7a6a4a">Couve refogada e beterraba · mamão</text>
    <line x1="0" y1="55" x2="480" y2="55" stroke="#e8d8a8" stroke-width="0.8" stroke-dasharray="3,3"/>
    <g transform="translate(295,20)">
      <!-- Lentilha -->
      <g transform="translate(0,0)">
        <ellipse cx="0" cy="0" rx="12" ry="7" fill="#a87545"/>
        <ellipse cx="-3" cy="-1" rx="1.5" ry="1" fill="#8B5E3C"/>
        <ellipse cx="3" cy="0" rx="1.5" ry="1" fill="#8B5E3C"/>
        <ellipse cx="0" cy="2" rx="1.5" ry="1" fill="#8B5E3C"/>
      </g>
      <!-- Arroz -->
      <g transform="translate(35,0)">
        <ellipse cx="0" cy="0" rx="12" ry="8" fill="#fdf6e8" stroke="#d4c8a8" stroke-width="0.8"/>
        <ellipse cx="0" cy="0" rx="1.5" ry="0.8" fill="#c8b888"/>
      </g>
      <!-- Ovo -->
      <g transform="translate(70,0)">
        <ellipse cx="0" cy="0" rx="9" ry="11" fill="#fefdf6"/>
        <ellipse cx="0" cy="-1" rx="5" ry="6" fill="#E8C94A"/>
      </g>
      <!-- Couve -->
      <g transform="translate(105,0)">
        <ellipse cx="0" cy="0" rx="11" ry="6" fill="#3D6849"/>
        <ellipse cx="0" cy="-1" rx="9" ry="3" fill="#4A7C59"/>
      </g>
      <!-- Mamão -->
      <g transform="translate(140,0)">
        <path d="M-7 -8 Q -7 6 0 9 Q 7 6 7 -8 Z" fill="#f57c00"/>
        <ellipse cx="0" cy="0" rx="3" ry="4" fill="#3a1f10"/>
      </g>
    </g>
  </g>

  <!-- ============ SEXTA-FEIRA ============ -->
  <g transform="translate(60,550)">
    <rect x="0" y="0" width="60" height="42" rx="8" fill="#8B6238"/>
    <text x="30" y="16" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#e8d8a8" letter-spacing="1">SEX</text>
    <text x="30" y="32" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#fff">06</text>
    <text x="75" y="14" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#3a3a3a">Arroz, feijão e frango grelhado</text>
    <text x="75" y="30" font-family="Inter,sans-serif" font-size="10" fill="#7a6a4a">Abóbora cozida e chuchu · melancia</text>
    <line x1="0" y1="55" x2="480" y2="55" stroke="#e8d8a8" stroke-width="0.8" stroke-dasharray="3,3"/>
    <g transform="translate(295,20)">
      <!-- Arroz -->
      <g transform="translate(0,0)">
        <ellipse cx="0" cy="0" rx="12" ry="8" fill="#fdf6e8" stroke="#d4c8a8" stroke-width="0.8"/>
        <ellipse cx="0" cy="0" rx="1.5" ry="0.8" fill="#c8b888"/>
      </g>
      <!-- Feijão -->
      <g transform="translate(35,0)">
        <ellipse cx="0" cy="0" rx="12" ry="7" fill="#5a3a23"/>
        <ellipse cx="0" cy="0" rx="1.8" ry="1.3" fill="#2a1408"/>
      </g>
      <!-- Frango grelhado -->
      <g transform="translate(70,0)">
        <ellipse cx="0" cy="0" rx="11" ry="6" fill="#D4A54A"/>
        <line x1="-7" y1="-2" x2="7" y2="-2" stroke="#6e4828" stroke-width="0.8"/>
        <line x1="-7" y1="2" x2="7" y2="2" stroke="#6e4828" stroke-width="0.8"/>
      </g>
      <!-- Abóbora -->
      <g transform="translate(105,0)">
        <circle cx="0" cy="0" r="8" fill="#f57c00"/>
        <line x1="-7" y1="-2" x2="7" y2="-2" stroke="#c25a00" stroke-width="0.6"/>
        <line x1="-8" y1="2" x2="8" y2="2" stroke="#c25a00" stroke-width="0.6"/>
      </g>
      <!-- Melancia -->
      <g transform="translate(140,0)">
        <path d="M-10 4 Q -10 -8 0 -8 Q 10 -8 10 4 Z" fill="#E87461"/>
        <path d="M-10 4 Q -10 0 0 0 Q 10 0 10 4 Z" fill="#7CB98A"/>
        <circle cx="-3" cy="-3" r="0.8" fill="#3a1f10"/>
        <circle cx="3" cy="-2" r="0.8" fill="#3a1f10"/>
      </g>
    </g>
  </g>

  <!-- ============ RODAPÉ DO CLIPBOARD ============ -->
  <g transform="translate(60,635)">
    <!-- Selo -->
    <rect x="0" y="0" width="480" height="30" rx="6" fill="#4A7C59" opacity="0.08"/>
    <text x="240" y="13" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" letter-spacing="2" fill="#2d5a3a">85% IN NATURA · 45% AGRICULTURA FAMILIAR · MÁX. 10% ULTRAPROCESSADOS</text>
    <text x="240" y="25" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#4A7C59" font-style="italic">Conforme Res. FNDE nº 4/2026 · Educação Infantil</text>
  </g>

  <!-- Rodapé fora do clipboard -->
  <text x="300" y="710" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="2.5" fill="#7a6a4a">PAE-DF · GESTEC · SEEDF</text>
  <text x="300" y="730" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#7a6a4a" font-style="italic">Cardápio ilustrativo — exemplo pedagógico</text>
</svg>
